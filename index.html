<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Priority Waste · Sales Wallboard</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Inter:wght@400;500;600;700;800&display=swap" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
  /* ============ DESIGN SYSTEM ============
     Restrained palette:
     - Yellow (#FFC20E): brand accent, used sparingly for emphasis (ranks, key totals)
     - Off-white (#e8e8e8): default text
     - Muted grays: structure, backgrounds, supporting data
     - Red (#e74c3c): only for losses/churn
     - Green (#27ae60): only for top performance/wins
     Everything else neutral.
  */
  :root {
    --yellow: #FFC20E;
    --yellow-soft: #FFD752;
    --black: #000000;
    --bg: #0d0d0d;
    --panel: #161616;
    --panel-2: #1f1f1f;
    --border: #2d2d2d;
    --border-strong: #3a3a3a;
    --text: #e8e8e8;
    --text-dim: #999999;
    --text-muted: #666666;
    --red: #e74c3c;
    --red-bg: #1f0a0a;
    --green: #27ae60;
    --green-bg: #0a1f12;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; overflow: hidden; }
  body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg); color: var(--text); font-size: 13px; -webkit-font-smoothing: antialiased; }
  .display { font-family: 'Oswald', sans-serif; letter-spacing: 0.01em; }

  /* UPLOAD */
  .upload-screen { height: 100vh; width: 100vw; display: flex; align-items: center; justify-content: center; background: var(--bg); padding: 40px; }
  .upload-box { max-width: 680px; width: 100%; padding: 48px; background: var(--panel); border: 2px solid var(--border-strong); }
  .upload-logo { display: flex; align-items: center; gap: 16px; margin-bottom: 32px; }
  .logo-mark { width: 52px; height: 52px; background: var(--yellow); color: var(--black); display: flex; align-items: center; justify-content: center; font-size: 26px; font-weight: 900; }
  .upload-title { font-family: 'Oswald', sans-serif; font-size: 44px; font-weight: 700; line-height: 1.05; color: var(--text); text-transform: uppercase; margin-bottom: 8px; letter-spacing: -0.01em; }
  .upload-title .hl { color: var(--yellow); }
  .upload-sub { font-size: 14px; color: var(--text-dim); margin-bottom: 28px; line-height: 1.6; }
  .drop-zone { display: block; cursor: pointer; padding: 40px; text-align: center; border: 2px dashed var(--border-strong); background: var(--bg); transition: all 0.15s; }
  .drop-zone:hover, .drop-zone.dragging { background: var(--panel-2); border-color: var(--yellow); }
  .drop-icon { font-size: 40px; margin-bottom: 12px; opacity: 0.6; }
  .drop-title { font-family: 'Oswald', sans-serif; font-size: 20px; font-weight: 700; text-transform: uppercase; color: var(--yellow); }
  .drop-sub { font-size: 11px; color: var(--text-muted); margin-top: 8px; font-weight: 500; }
  .error-banner { margin-top: 16px; padding: 14px; background: var(--red-bg); border: 1px solid var(--red); color: var(--red); font-weight: 600; font-size: 13px; }

  /* WALLBOARD */
  .wallboard { display: none; height: 100vh; width: 100vw; flex-direction: column; }
  .wallboard.active { display: flex; }

  /* TOP BAR */
  .top-bar {
    flex-shrink: 0; display: flex; align-items: center; justify-content: space-between;
    padding: 8px 16px; background: var(--panel); border-bottom: 1px solid var(--border-strong);
    height: 50px;
  }
  .brand-block { display: flex; align-items: center; gap: 10px; }
  .brand-mark { width: 32px; height: 32px; background: var(--yellow); color: var(--black); display: flex; align-items: center; justify-content: center; font-size: 17px; font-weight: 900; }
  .brand-name { font-family: 'Oswald', sans-serif; font-size: 15px; font-weight: 700; color: var(--text); line-height: 1; letter-spacing: 0.05em; }
  .brand-sub { font-size: 9px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.2em; font-weight: 600; margin-top: 3px; }

  .period-controls { display: flex; align-items: center; gap: 4px; position: relative; }
  .period-label { font-size: 9px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.2em; font-weight: 700; margin-right: 6px; }
  .period-btn { background: transparent; color: var(--text-dim); border: 1px solid var(--border-strong); padding: 5px 10px; font-family: 'Inter', sans-serif; font-weight: 600; font-size: 11px; text-transform: uppercase; cursor: pointer; letter-spacing: 0.05em; transition: all 0.15s; }
  .period-btn:hover { background: var(--panel-2); color: var(--text); }
  .period-btn.active { background: var(--yellow); color: var(--black); border-color: var(--yellow); font-weight: 700; }
  .period-btn.custom-btn.active { background: var(--green); color: var(--black); border-color: var(--green); }

  .custom-range-pop { position: absolute; top: 38px; background: var(--panel); border: 1px solid var(--yellow); padding: 14px; z-index: 100; display: none; right: 0; box-shadow: 0 8px 24px rgba(0,0,0,0.7); min-width: 250px; }
  .custom-range-pop.open { display: block; }
  .custom-range-pop h4 { font-family: 'Oswald', sans-serif; font-size: 12px; font-weight: 700; color: var(--yellow); text-transform: uppercase; letter-spacing: 0.15em; margin-bottom: 10px; }
  .range-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
  .range-row label { font-size: 10px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.1em; font-weight: 600; width: 36px; }
  .range-row input { background: var(--bg); color: var(--yellow); border: 1px solid var(--border-strong); padding: 5px 8px; font-family: 'Inter', sans-serif; font-weight: 600; font-size: 12px; width: 140px; }
  .range-row input::-webkit-calendar-picker-indicator { filter: invert(75%) sepia(100%) saturate(400%) hue-rotate(0deg); cursor: pointer; }
  .range-apply { background: var(--yellow); color: var(--black); border: none; padding: 7px 14px; font-family: 'Oswald', sans-serif; font-weight: 700; font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em; cursor: pointer; width: 100%; margin-top: 6px; }
  .range-apply:hover { background: var(--yellow-soft); }
  .range-preset { display: flex; gap: 4px; margin-top: 6px; }
  .range-preset button { flex: 1; background: var(--bg); color: var(--text-dim); border: 1px solid var(--border-strong); padding: 4px; font-family: 'Inter', sans-serif; font-weight: 600; font-size: 10px; cursor: pointer; text-transform: uppercase; letter-spacing: 0.05em; }
  .range-preset button:hover { background: var(--panel-2); color: var(--yellow); }

  .clock-block { display: flex; align-items: center; gap: 12px; }
  .clock-time { font-family: 'Oswald', sans-serif; font-size: 18px; font-weight: 700; color: var(--text); line-height: 1; }
  .clock-date { font-size: 9px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.18em; font-weight: 600; margin-top: 3px; }
  .reset-btn { padding: 5px 10px; font-family: 'Inter', sans-serif; font-weight: 600; text-transform: uppercase; font-size: 10px; letter-spacing: 0.1em; background: transparent; color: var(--text-dim); border: 1px solid var(--border-strong); cursor: pointer; }
  .reset-btn:hover { background: var(--panel-2); color: var(--text); }

  /* KPI STRIP - cleaner, more restrained */
  .kpi-strip { flex-shrink: 0; display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; padding: 8px; background: var(--bg); }
  .kpi-cell {
    padding: 10px 14px; background: var(--panel); border: 1px solid var(--border);
    display: flex; flex-direction: column; justify-content: center;
    position: relative; overflow: hidden; min-height: 0;
    border-left: 3px solid var(--border-strong);
  }
  .kpi-cell.primary { border-left-color: var(--yellow); }
  .kpi-cell.danger { border-left-color: var(--red); }
  .kpi-cell.success { border-left-color: var(--green); }
  .kpi-cell.neutral { border-left-color: var(--border-strong); }

  .kpi-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.15em; color: var(--text-muted); line-height: 1; }
  .kpi-value { font-family: 'Oswald', sans-serif; font-size: 30px; font-weight: 700; line-height: 1; margin-top: 6px; color: var(--text); }
  .kpi-cell.primary .kpi-value { color: var(--yellow); }
  .kpi-cell.danger .kpi-value { color: var(--red); }
  .kpi-cell.success .kpi-value { color: var(--green); }
  .kpi-sub { font-size: 11px; font-weight: 500; color: var(--text-dim); margin-top: 4px; }
  .kpi-icon { position: absolute; top: 6px; right: 10px; font-size: 16px; opacity: 0.15; }

  /* QUAD GRID */
  .quad-grid { flex: 1; display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; gap: 8px; padding: 0 8px 8px 8px; min-height: 0; }

  /* CELL */
  .cell { background: var(--panel); border: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; min-height: 0; }
  .cell-header { flex-shrink: 0; padding: 8px 14px; background: var(--panel-2); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
  .cell-header-title { font-family: 'Oswald', sans-serif; font-weight: 700; font-size: 13px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text); }
  .cell-header-meta { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-muted); }
  .cell-body { flex: 1; padding: 10px; position: relative; min-height: 0; overflow: hidden; }

  .sub-grid { height: 100%; display: grid; gap: 6px; min-height: 0; }

  /* ===== Q1 LEADERBOARD ===== */
  .q1-grid { grid-template-rows: 1fr auto; }
  .leader-list { overflow: hidden; display: flex; flex-direction: column; gap: 3px; min-height: 0; }
  .leader-row {
    flex: 1;
    display: grid; grid-template-columns: 32px 1fr 90px;
    align-items: center; gap: 12px;
    padding: 4px 12px;
    background: var(--panel-2);
    border-left: 3px solid transparent;
    min-height: 0;
  }
  .leader-row.gold { background: linear-gradient(90deg, rgba(255,194,14,0.15), transparent); border-left-color: var(--yellow); }
  .leader-row.silver { border-left-color: #999; }
  .leader-row.bronze { border-left-color: #b87333; }
  .leader-rank { font-family: 'Oswald', sans-serif; font-size: 18px; font-weight: 700; text-align: center; color: var(--text-muted); }
  .leader-row.gold .leader-rank { color: var(--yellow); }
  .leader-name { font-family: 'Oswald', sans-serif; font-size: 14px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.02em; line-height: 1.1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--text); }
  .leader-stats { font-size: 10px; font-weight: 500; color: var(--text-dim); margin-top: 2px; line-height: 1.2; }
  .leader-stats strong { color: var(--text); font-weight: 600; }
  .leader-value { font-family: 'Oswald', sans-serif; font-size: 16px; font-weight: 700; text-align: right; color: var(--text); }
  .leader-row.gold .leader-value { color: var(--yellow); }

  .broker-strip {
    padding: 8px 14px; background: var(--panel-2); border: 1px solid var(--border-strong); border-left: 3px solid var(--text-dim);
    display: grid; grid-template-columns: auto 1fr auto; align-items: center; gap: 14px;
  }
  .broker-strip-label { font-family: 'Oswald', sans-serif; font-weight: 700; font-size: 12px; text-transform: uppercase; color: var(--text-dim); letter-spacing: 0.12em; }
  .broker-strip-value { font-family: 'Oswald', sans-serif; font-size: 22px; font-weight: 700; color: var(--text); line-height: 1; }
  .broker-strip-stats { display: flex; gap: 14px; font-size: 10px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-muted); }
  .broker-strip-stats strong { color: var(--text-dim); font-family: 'Oswald', sans-serif; font-weight: 700; }

  /* ===== Q2 PRODUCT MIX + TREND ===== */
  .q2-grid { grid-template-rows: auto 1fr; }
  .product-pills { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; }
  .product-pill {
    padding: 8px 12px; background: var(--panel-2); border: 1px solid var(--border);
    display: flex; flex-direction: column;
    border-left: 3px solid var(--border-strong);
  }
  .product-pill.fel { border-left-color: var(--yellow); }
  .product-pill.ro { border-left-color: var(--text-dim); }
  .product-pill.resi { border-left-color: var(--text-muted); }
  .product-pill.broker { border-left-color: var(--border-strong); }
  .product-pill-label { font-size: 10px; font-weight: 700; text-transform: uppercase; color: var(--text-muted); letter-spacing: 0.1em; }
  .product-pill-main { font-family: 'Oswald', sans-serif; font-size: 22px; font-weight: 700; color: var(--text); line-height: 1; margin-top: 4px; }
  .product-pill.fel .product-pill-main { color: var(--yellow); }
  .product-pill-sub { font-size: 10px; font-weight: 500; color: var(--text-dim); margin-top: 3px; }

  /* ===== Q3 CONTAINER SHARE ===== */
  .q3-grid { grid-template-columns: 1fr 1fr; grid-template-rows: repeat(4, 1fr); gap: 4px; }
  .size-mini {
    background: var(--panel-2); padding: 5px 10px;
    display: grid; grid-template-columns: 56px 1fr; gap: 8px;
    border: 1px solid var(--border);
    min-height: 0; align-items: center;
  }
  .size-mini-label { font-family: 'Oswald', sans-serif; font-weight: 700; font-size: 14px; color: var(--yellow); line-height: 1; }
  .size-mini-tot { font-size: 9px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.1em; font-weight: 600; margin-top: 2px; }
  .size-mini-body { display: flex; flex-direction: column; gap: 2px; min-height: 0; overflow: hidden; }
  .share-row { display: grid; grid-template-columns: 80px 1fr 38px; align-items: center; gap: 8px; font-size: 10px; line-height: 1.2; }
  .share-row .rep { font-family: 'Oswald', sans-serif; font-weight: 700; font-size: 10px; text-transform: uppercase; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--text); }
  .share-row .rep.broker { color: var(--text-dim); font-style: italic; }
  .share-row .bar { height: 8px; background: var(--border); position: relative; overflow: hidden; }
  .share-row .bar-fill { height: 100%; background: var(--text-dim); }
  .share-row .bar-fill.gold { background: var(--yellow); }
  .share-row .pct { font-family: 'Oswald', sans-serif; font-size: 11px; font-weight: 700; color: var(--text-dim); text-align: right; white-space: nowrap; }
  .share-row.top .pct { color: var(--yellow); }

  /* ===== Q4 ROLL-OFF (REDESIGNED) =====
     New focus:
     - RO velocity (deals/mo trend, leading indicator)
     - Yield: avg $ per container by size (upsell signal)
     - Top RO performers (who's driving fleet utilization)
     - Temp churn risk (1mo terms WILL roll out, need replenishment)
  */
  .q4-grid { grid-template-rows: auto auto 1fr; gap: 6px; }
  .ro-headline {
    display: grid; grid-template-columns: 1.4fr 1fr 1fr; gap: 6px;
  }
  .ro-headline-cell { padding: 8px 12px; background: var(--panel-2); border: 1px solid var(--border); }
  .ro-headline-cell.warn { border-left: 3px solid var(--red); }
  .ro-headline-cell.primary { border-left: 3px solid var(--yellow); }
  .ro-headline-cell.neutral { border-left: 3px solid var(--text-dim); }
  .ro-headline-label { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.18em; color: var(--text-muted); }
  .ro-headline-val { font-family: 'Oswald', sans-serif; font-size: 22px; font-weight: 700; line-height: 1; margin-top: 3px; color: var(--text); }
  .ro-headline-cell.warn .ro-headline-val { color: var(--red); }
  .ro-headline-cell.primary .ro-headline-val { color: var(--yellow); }
  .ro-headline-sub { font-size: 9px; font-weight: 500; color: var(--text-dim); margin-top: 2px; }

  .ro-yield-table { display: flex; flex-direction: column; gap: 2px; min-height: 0; overflow: hidden; }
  .ro-yield-row {
    display: grid; grid-template-columns: 50px 1fr 70px 70px;
    align-items: center; gap: 10px; padding: 4px 10px;
    background: var(--panel-2); font-size: 11px;
    flex: 1; min-height: 0;
  }
  .ro-yield-size { font-family: 'Oswald', sans-serif; font-weight: 700; font-size: 14px; color: var(--yellow); }
  .ro-yield-bar-wrap { height: 9px; background: var(--border); }
  .ro-yield-bar { height: 100%; background: var(--text-dim); }
  .ro-yield-bar.top { background: var(--yellow); }
  .ro-yield-count { font-family: 'Oswald', sans-serif; font-weight: 700; font-size: 13px; text-align: right; color: var(--text); }
  .ro-yield-rev { font-family: 'Oswald', sans-serif; font-weight: 600; font-size: 11px; text-align: right; color: var(--text-dim); }

  .ro-section-row { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; min-height: 0; }
  .ro-section { background: var(--panel-2); border: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; min-height: 0; }
  .ro-section-header {
    flex-shrink: 0; padding: 5px 10px; background: var(--bg);
    font-family: 'Oswald', sans-serif; font-size: 10px; font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.12em; color: var(--text-dim);
    display: flex; justify-content: space-between; align-items: center;
    border-bottom: 1px solid var(--border);
  }
  .ro-section-body { flex: 1; padding: 6px 8px; min-height: 0; overflow: hidden; display: flex; flex-direction: column; gap: 3px; }

  .ro-rep-row { display: grid; grid-template-columns: 1fr auto; gap: 8px; align-items: center; padding: 3px 4px; font-size: 11px; }
  .ro-rep-name { font-family: 'Oswald', sans-serif; font-weight: 700; font-size: 11px; text-transform: uppercase; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .ro-rep-vals { display: flex; gap: 8px; align-items: baseline; font-size: 10px; }
  .ro-rep-vals .cont { font-family: 'Oswald', sans-serif; font-weight: 700; font-size: 12px; color: var(--yellow); }
  .ro-rep-vals .rev { color: var(--text-dim); }

  .chart-wrap { position: relative; width: 100%; height: 100%; min-height: 0; }
  .no-data { padding: 20px; text-align: center; color: var(--text-muted); font-weight: 600; font-size: 11px; }

  @media (max-width: 1199px) {
    .quad-grid { grid-template-columns: 1fr; grid-template-rows: repeat(4, 1fr); }
    html, body { overflow: auto; height: auto; }
  }
</style>
</head>
<body>

<div id="uploadScreen" class="upload-screen">
  <div class="upload-box">
    <div class="upload-logo">
      <div class="logo-mark">P</div>
      <div>
        <div style="font-family:'Oswald',sans-serif;font-size:20px;font-weight:700;color:var(--text);line-height:1;letter-spacing:0.05em">PRIORITY WASTE</div>
        <div style="font-size:10px;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.25em;font-weight:600;margin-top:3px">Sales Wallboard</div>
      </div>
    </div>
    <div class="upload-title">One Screen.<br /><span class="hl">All Sales Data.</span></div>
    <p class="upload-sub">Upload the workbook. Four panels — leaderboard, product mix, container share, roll-off intelligence. Filterable by period.</p>
    <label id="dropZone" class="drop-zone">
      <input type="file" id="fileInput" accept=".xlsx,.xls" hidden />
      <div class="drop-icon">📤</div>
      <div class="drop-title" id="dropTitle">Click or Drag .xlsx</div>
      <div class="drop-sub">SALES_DEPARTMENT2026.xlsx</div>
    </label>
    <div id="errorBanner" class="error-banner" style="display:none"></div>
  </div>
</div>

<div id="wallboard" class="wallboard">
  <div class="top-bar">
    <div class="brand-block">
      <div class="brand-mark">P</div>
      <div>
        <div class="brand-name">PRIORITY WASTE · SALES</div>
        <div class="brand-sub" id="brandSub">Inside + Outside</div>
      </div>
    </div>
    <div class="period-controls">
      <div class="period-label">Period:</div>
      <button class="period-btn" data-period="ALL">All Time</button>
      <button class="period-btn" data-period="MTD">This Mo</button>
      <button class="period-btn" data-period="LAST1">Last Mo</button>
      <button class="period-btn active" data-period="LAST3">Last 3 Mo</button>
      <button class="period-btn" data-period="LAST6">Last 6 Mo</button>
      <button class="period-btn" data-period="YTD">YTD</button>
      <button class="period-btn custom-btn" data-period="CUSTOM" id="customBtn">⚙ Custom</button>
      <div class="custom-range-pop" id="customRangePop">
        <h4>Custom Date Range</h4>
        <div class="range-row"><label>From</label><input type="date" id="rangeFrom" /></div>
        <div class="range-row"><label>To</label><input type="date" id="rangeTo" /></div>
        <div class="range-preset">
          <button data-preset="30">30d</button>
          <button data-preset="60">60d</button>
          <button data-preset="90">90d</button>
          <button data-preset="180">6mo</button>
        </div>
        <button class="range-apply" id="rangeApply">Apply Range</button>
      </div>
    </div>
    <div class="clock-block">
      <div>
        <div class="clock-time" id="clockTime">00:00:00</div>
        <div class="clock-date" id="clockDate">—</div>
      </div>
      <button class="reset-btn" id="resetBtn">Reset</button>
    </div>
  </div>

  <div class="kpi-strip" id="kpiStrip"></div>
  <div class="quad-grid" id="quadGrid"></div>
</div>

<script>
const YELLOW = '#FFC20E';
const BLACK = '#000000';
const RED = '#e74c3c';
const GREEN = '#27ae60';
const TEXT = '#e8e8e8';
const TEXT_DIM = '#999999';
const PANEL = '#161616';
const BORDER = '#2d2d2d';

const EXCLUDED_REPS = new Set([
  'TEAGAN F', 'TEAGAN FULLER', 'TEAGAN',
  'LUKE S', 'LUKE SCHROYER',
  'JACKIE S', 'JACKIE',
  'JORDAN R', 'JORDAN ROWLAND'
]);

const fmtMoney = (n) => {
  if (n == null || isNaN(n)) return '—';
  if (Math.abs(n) >= 1_000_000) return `$${(n / 1_000_000).toFixed(2)}M`;
  if (Math.abs(n) >= 1_000) return `$${(n / 1_000).toFixed(1)}K`;
  return `$${Math.round(n).toLocaleString()}`;
};
const fmtInt = (n) => (n == null || isNaN(n) ? '—' : Math.round(n).toLocaleString());
const fmtPct = (n) => `${Math.round(n)}%`;

const normalizeSR = (s) => {
  if (!s) return null;
  const t = String(s).trim().toUpperCase();
  const map = {
    'ALEX K': 'ALEX KISH', 'ALEX KISH': 'ALEX KISH',
    'ALEXANDER L': 'ALEX LAPINSKI', 'ALEX L': 'ALEX LAPINSKI', 'ALEX LAPINSKI': 'ALEX LAPINSKI',
    'HUNTER': 'HUNTER CZYMBOR', 'HUNTER C': 'HUNTER CZYMBOR',
    'HUNTER CZYMBOR': 'HUNTER CZYMBOR', 'HUNTER CZYBMOR': 'HUNTER CZYMBOR',
    'MIKE C': 'MICHAEL CARROLL', 'MICHAEL CARROLL': 'MICHAEL CARROLL',
    'BRANDON M': 'BRANDON MISIAK', 'BRANDON MISIAK': 'BRANDON MISIAK',
    'ALICIA H': 'ALICIA HOLMES', 'ALICIA HOLMES': 'ALICIA HOLMES',
    'ANDREA K': 'ANDREA KRUSE', 'ANDREA KRUSE': 'ANDREA KRUSE',
    'ANDREANA': 'ANDREANA CVETKOVSKA', 'ANDREANA CVETKOVSKA': 'ANDREANA CVETKOVSKA', 'ANDREANA CVETKOVSA': 'ANDREANA CVETKOVSKA',
    'BRETT Q': 'BRETT QUINN', 'BRETT QUINN': 'BRETT QUINN',
    'JANEEN': 'JANEEN O', 'JANEEN O': 'JANEEN O',
    'ALAYNA P': 'ALAYNA PANDUREN', 'ALAYNA PANDUREN': 'ALAYNA PANDUREN',
    'LAUREN R': 'LAUREN R', 'LUKE D': 'LUKE D', 'MEGAN S': 'MEGAN S',
    'DAN V': 'DAN V', 'SAM C': 'SAM C', 'PAUL R': 'PAUL R',
    'MYRNA Z': 'MYRNA Z', 'MATTHEW H': 'MATTHEW H', 'DAN M': 'DAN M',
    'TAMMY A': 'TAMMY A', 'NARMINA F': 'NARMINA F',
    'BROKER': 'BROKERS', 'BROKERS': 'BROKERS'
  };
  return map[t] || t;
};
const isExcluded = (rep) => !rep || EXCLUDED_REPS.has(rep);
const isBroker = (rep) => rep === 'BROKERS';

const parseNum = (v) => {
  if (v == null || v === '') return 0;
  if (typeof v === 'number') return v;
  const n = parseFloat(String(v).replace(/[$,\s]/g, ''));
  return isNaN(n) ? 0 : n;
};

const getCol = (row, ...names) => {
  for (const n of names) {
    if (row[n] !== undefined) return row[n];
    if (row[' ' + n + ' '] !== undefined) return row[' ' + n + ' '];
    if (row[' ' + n] !== undefined) return row[' ' + n];
    if (row[n + ' '] !== undefined) return row[n + ' '];
  }
  const target = names[0].trim().toLowerCase();
  for (const k of Object.keys(row)) {
    if (String(k).trim().toLowerCase() === target) return row[k];
  }
  return undefined;
};

const normalizeContainerSize = (s) => {
  if (s == null || s === '') return null;
  let t = String(s).trim().toUpperCase().replace(/\s+/g, '');
  if (/^\d+$/.test(t)) {
    const n = parseInt(t);
    if (n >= 2 && n <= 10) return `${n}-YD`;
  }
  const m = t.match(/^(\d+)[-]?YD$/);
  if (m) return `${m[1]}-YD`;
  if (t.includes('GAL')) return t.replace(/-/g, ' ');
  return t;
};
const classifySize = (sizeNorm) => {
  if (!sizeNorm) return null;
  if (sizeNorm.includes('GAL')) return 'RESI';
  const m = sizeNorm.match(/^(\d+)-YD$/);
  if (!m) return null;
  const n = parseInt(m[1]);
  return n <= 8 ? 'FEL' : 'RO';
};

function computeMetrics(workbook) {
  const out = { rawBrokResi: [], rawLost: [], availableMonths: [] };
  const sheets = workbook.SheetNames;

  if (sheets.includes('Brok-Resi')) {
    const raw = XLSX.utils.sheet_to_json(workbook.Sheets['Brok-Resi'], { defval: null });
    out.rawBrokResi = raw.filter(r => getCol(r, 'Customer Name') || getCol(r, 'SR')).map(r => {
      const size = normalizeContainerSize(getCol(r, 'Container Size'));
      return {
        sr: normalizeSR(getCol(r, 'SR')),
        size, cls: classifySize(size),
        year: parseNum(getCol(r, 'YEAR')),
        month: parseNum(getCol(r, 'Month')),
        containers: parseNum(getCol(r, '#container')) || 1,
        monthly: parseNum(getCol(r, '$$Monthly')),
        term: parseNum(getCol(r, 'Month Term'))
      };
    }).filter(r => r.year && r.month);
  }

  if (sheets.includes('Lost Business')) {
    const raw = XLSX.utils.sheet_to_json(workbook.Sheets['Lost Business'], { defval: null });
    const monthMap = { JANUARY:1, FEBRUARY:2, MARCH:3, APRIL:4, MAY:5, JUNE:6, JULY:7, AUGUST:8, SEPTEMBER:9, OCTOBER:10, NOVEMBER:11, DECEMBER:12 };
    out.rawLost = raw.filter(r => getCol(r, 'LOST BUSINESS CODE') && getCol(r, 'MONTHLY REVENUE') != null).map(r => ({
      sr: normalizeSR(getCol(r, 'SR')),
      monthlyRev: parseNum(getCol(r, 'MONTHLY REVENUE')),
      year: parseNum(getCol(r, 'YEAR')),
      month: monthMap[String(getCol(r, 'MONTH') || '').trim().toUpperCase()] || null,
      service: String(getCol(r, 'SERVICE TYPE') || '').trim().toUpperCase()
    }));
  }

  const monthsSet = new Set();
  out.rawBrokResi.forEach(r => monthsSet.add(`${r.year}-${String(r.month).padStart(2,'0')}`));
  out.availableMonths = [...monthsSet].sort().reverse();
  return out;
}

function buildViewData(metrics, period) {
  const inRange = (y, m) => {
    if (!y || !m) return false;
    if (period.type === 'ALL') return true;
    const key = y * 12 + m;
    const startKey = period.startY * 12 + period.startM;
    const endKey = period.endY * 12 + period.endM;
    return key >= startKey && key <= endKey;
  };

  const br = metrics.rawBrokResi.filter(r => inRange(r.year, r.month));
  const lost = metrics.rawLost.filter(r => inRange(r.year, r.month));

  // Rep aggregates
  const repMap = new Map();
  br.forEach(r => {
    if (isExcluded(r.sr)) return;
    if (!repMap.has(r.sr)) repMap.set(r.sr, { rep: r.sr, deals: 0, monthly: 0, containers: 0, fel: 0, ro: 0, resi: 0, isBroker: isBroker(r.sr) });
    const o = repMap.get(r.sr);
    o.deals++; o.monthly += r.monthly; o.containers += r.containers;
    if (r.cls === 'FEL') o.fel += r.containers;
    else if (r.cls === 'RO') o.ro += r.containers;
    else if (r.cls === 'RESI') o.resi += r.containers;
  });
  const allReps = [...repMap.values()].sort((a, b) => b.monthly - a.monthly);
  const repLeaderboard = allReps.filter(r => !r.isBroker).slice(0, 8);
  const brokerStats = allReps.find(r => r.isBroker) || { rep: 'BROKERS', deals: 0, monthly: 0, containers: 0, fel: 0, ro: 0, resi: 0 };

  const totalMonthly = br.reduce((s, r) => s + r.monthly, 0);
  const totalDeals = br.length;
  const totalContainers = br.reduce((s, r) => s + r.containers, 0);

  const classCount = { FEL: 0, RO: 0, RESI: 0 };
  const classMonthly = { FEL: 0, RO: 0, RESI: 0 };
  const classContainers = { FEL: 0, RO: 0, RESI: 0 };
  br.forEach(r => {
    const k = r.cls;
    if (!k || !(k in classCount)) return;
    classCount[k]++; classMonthly[k] += r.monthly; classContainers[k] += r.containers;
  });

  // Container share
  const sizeMap = new Map();
  br.forEach(r => {
    if (!r.size || isExcluded(r.sr)) return;
    if (!sizeMap.has(r.size)) sizeMap.set(r.size, { size: r.size, cls: r.cls, total: 0, totalMonthly: 0, byRep: {} });
    const o = sizeMap.get(r.size);
    o.total += r.containers; o.totalMonthly += r.monthly;
    o.byRep[r.sr] = (o.byRep[r.sr] || 0) + r.containers;
  });
  const sizeArray = [...sizeMap.values()].map(s => ({
    ...s,
    repShares: Object.entries(s.byRep).map(([rep, count]) => ({ rep, count, pct: (count / s.total) * 100 })).sort((a, b) => b.count - a.count)
  })).sort((a, b) => b.total - a.total);

  // ===== ROLL-OFF: REBUILT =====
  const roRows = br.filter(r => r.cls === 'RO');
  const tempRO = roRows.filter(r => parseNum(r.term) <= 1); // 1mo or 0 (unrecorded)
  const longTermRO = roRows.filter(r => parseNum(r.term) >= 24);

  // Total + mix
  const roTotalContainers = roRows.reduce((s, r) => s + r.containers, 0);
  const roTotalDeals = roRows.length;
  const roMonthlyRev = roRows.reduce((s, r) => s + r.monthly, 0);

  // Yield by size: avg $/container/month
  const roSizeMap = new Map();
  roRows.forEach(r => {
    if (!r.size) return;
    if (!roSizeMap.has(r.size)) roSizeMap.set(r.size, { size: r.size, count: 0, deals: 0, monthly: 0 });
    const o = roSizeMap.get(r.size);
    o.count += r.containers;
    o.deals++;
    o.monthly += r.monthly;
  });
  const roSizes = [...roSizeMap.values()]
    .filter(s => s.count >= 3) // hide noise sizes
    .map(s => ({ ...s, avgYield: s.monthly / Math.max(1, s.deals) }))
    .sort((a, b) => {
      const na = parseInt(a.size.match(/\d+/)?.[0] || '0');
      const nb = parseInt(b.size.match(/\d+/)?.[0] || '0');
      return na - nb;
    });

  // RO velocity (monthly trend)
  const roVelocityMap = new Map();
  metrics.rawBrokResi.forEach(r => {
    if (r.cls !== 'RO') return;
    const key = `${r.year}-${String(r.month).padStart(2, '0')}`;
    if (!roVelocityMap.has(key)) roVelocityMap.set(key, { month: key, deals: 0, containers: 0 });
    const o = roVelocityMap.get(key);
    o.deals++;
    o.containers += r.containers;
  });
  const roVelocity = [...roVelocityMap.values()]
    .filter(t => t.deals >= 5)
    .sort((a, b) => a.month.localeCompare(b.month))
    .slice(-12);

  // Top RO performers
  const roRepMap = new Map();
  roRows.forEach(r => {
    if (isExcluded(r.sr)) return;
    if (!roRepMap.has(r.sr)) roRepMap.set(r.sr, { rep: r.sr, deals: 0, containers: 0, monthly: 0 });
    const o = roRepMap.get(r.sr);
    o.deals++; o.containers += r.containers; o.monthly += r.monthly;
  });
  const topRoReps = [...roRepMap.values()]
    .filter(r => !isBroker(r.rep))
    .sort((a, b) => b.monthly - a.monthly).slice(0, 6);

  // RO lost business
  const roLost = lost.filter(r => r.service === 'RO');
  const roLostRev = roLost.reduce((s, r) => s + r.monthlyRev, 0);

  // Overall rev trend
  const trendMap = new Map();
  metrics.rawBrokResi.forEach(r => {
    const key = `${r.year}-${String(r.month).padStart(2, '0')}`;
    if (!trendMap.has(key)) trendMap.set(key, { month: key, monthly: 0, deals: 0 });
    trendMap.get(key).monthly += r.monthly;
    trendMap.get(key).deals++;
  });
  const trend = [...trendMap.values()].filter(t => t.deals >= 10).sort((a, b) => a.month.localeCompare(b.month)).slice(-12);

  // Lost
  const lostMonthly = lost.reduce((s, r) => s + r.monthlyRev, 0);
  const lostCount = lost.length;

  return {
    period, totalMonthly, totalDeals, totalContainers,
    classCount, classMonthly, classContainers,
    repLeaderboard, brokerStats, sizeArray,
    roTotalContainers, roTotalDeals, roMonthlyRev,
    tempROContainers: tempRO.reduce((s, r) => s + r.containers, 0),
    tempRODeals: tempRO.length,
    longTermROContainers: longTermRO.reduce((s, r) => s + r.containers, 0),
    roSizes, roVelocity, topRoReps, roLostRev, roLostCount: roLost.length,
    lostMonthly, lostCount, trend
  };
}

function resolvePeriod(type, metrics, customStart, customEnd) {
  const months = metrics.availableMonths;
  if (months.length === 0) return { type: 'ALL', label: 'All Time' };
  const [latestY, latestM] = months[0].split('-').map(Number);
  const shiftBack = (y, m, monthsBack) => {
    let newM = m - monthsBack; let newY = y;
    while (newM <= 0) { newM += 12; newY--; }
    return [newY, newM];
  };

  if (type === 'ALL') return { type: 'ALL', label: 'All Time' };
  if (type === 'MTD') return { type: 'RANGE', startY: latestY, startM: latestM, endY: latestY, endM: latestM, label: `${latestY}-${String(latestM).padStart(2,'0')}` };
  if (type === 'LAST1') {
    const [y, m] = shiftBack(latestY, latestM, 1);
    return { type: 'RANGE', startY: y, startM: m, endY: y, endM: m, label: `${y}-${String(m).padStart(2,'0')}` };
  }
  if (type === 'LAST3') {
    const [y, m] = shiftBack(latestY, latestM, 2);
    return { type: 'RANGE', startY: y, startM: m, endY: latestY, endM: latestM, label: `Last 3 Mo` };
  }
  if (type === 'LAST6') {
    const [y, m] = shiftBack(latestY, latestM, 5);
    return { type: 'RANGE', startY: y, startM: m, endY: latestY, endM: latestM, label: `Last 6 Mo` };
  }
  if (type === 'YTD') return { type: 'RANGE', startY: latestY, startM: 1, endY: latestY, endM: latestM, label: `${latestY} YTD` };
  if (type === 'CUSTOM' && customStart && customEnd) {
    return {
      type: 'RANGE',
      startY: customStart.getFullYear(), startM: customStart.getMonth() + 1,
      endY: customEnd.getFullYear(), endM: customEnd.getMonth() + 1,
      label: `${customStart.toISOString().slice(0,10)} → ${customEnd.toISOString().slice(0,10)}`
    };
  }
  return { type: 'ALL', label: 'All Time' };
}

function renderQ4(view) {
  const { roTotalContainers, roTotalDeals, roMonthlyRev, tempROContainers, tempRODeals, longTermROContainers,
          roSizes, topRoReps, roLostRev, roLostCount } = view;

  // RO velocity for last full month vs prior — used to spot trend
  const last = view.roVelocity[view.roVelocity.length - 1];
  const prev = view.roVelocity[view.roVelocity.length - 2];
  const velocityDelta = (last && prev) ? ((last.deals - prev.deals) / prev.deals) * 100 : 0;
  const velocityDir = velocityDelta >= 0 ? '▲' : '▼';
  const velocityClass = velocityDelta >= 0 ? 'success' : 'warn';

  // Avg yield = monthly $ per container
  const avgYield = roTotalContainers > 0 ? roMonthlyRev / roTotalContainers : 0;

  // Find best yielding size
  const bestSize = [...roSizes].sort((a, b) => b.avgYield - a.avgYield)[0];
  const maxRoSize = roSizes.reduce((m, s) => Math.max(m, s.count), 1);

  return `
    <div class="cell">
      <div class="cell-header">
        <div class="cell-header-title">Roll-Off Intelligence</div>
        <div class="cell-header-meta">velocity · yield · pipeline risk</div>
      </div>
      <div class="cell-body">
        <div class="sub-grid q4-grid">
          <!-- Headline metrics row -->
          <div class="ro-headline">
            <div class="ro-headline-cell primary">
              <div class="ro-headline-label">Avg $ / Container / Mo</div>
              <div class="ro-headline-val">${fmtMoney(avgYield)}</div>
              <div class="ro-headline-sub">${fmtInt(roTotalContainers)} active · ${fmtMoney(roMonthlyRev)} total</div>
            </div>
            <div class="ro-headline-cell neutral">
              <div class="ro-headline-label">Best Yield Size</div>
              <div class="ro-headline-val">${bestSize ? `${bestSize.size}` : '—'}</div>
              <div class="ro-headline-sub">${bestSize ? `${fmtMoney(bestSize.avgYield)}/mo · ${fmtInt(bestSize.count)} sold` : '—'}</div>
            </div>
            <div class="ro-headline-cell warn">
              <div class="ro-headline-label">⚠ Temp Churn Risk</div>
              <div class="ro-headline-val">${fmtInt(tempROContainers)}</div>
              <div class="ro-headline-sub">${fmtInt(tempRODeals)} short-term · need replacement</div>
            </div>
          </div>

          <!-- Yield by size -->
          <div class="ro-yield-table">
            <div style="display:grid;grid-template-columns:50px 1fr 70px 70px;gap:10px;padding:3px 10px;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:0.15em;color:var(--text-muted)">
              <div>Size</div><div>Volume Share</div><div style="text-align:right">Containers</div><div style="text-align:right">Avg $/Mo</div>
            </div>
            ${roSizes.length === 0 ? '<div class="no-data">No roll-off data.</div>' :
              roSizes.map((s, i) => `
                <div class="ro-yield-row">
                  <div class="ro-yield-size">${s.size}</div>
                  <div class="ro-yield-bar-wrap"><div class="ro-yield-bar ${i === 0 ? 'top' : ''}" style="width:${(s.count/maxRoSize)*100}%"></div></div>
                  <div class="ro-yield-count">${fmtInt(s.count)}</div>
                  <div class="ro-yield-rev">${fmtMoney(s.avgYield)}</div>
                </div>`).join('')}
          </div>

          <!-- Bottom row: Top RO reps + RO velocity chart -->
          <div class="ro-section-row">
            <div class="ro-section">
              <div class="ro-section-header">
                <span>Top Roll-Off Reps</span>
                <span style="color:var(--yellow)">${fmtInt(roTotalDeals)} deals total</span>
              </div>
              <div class="ro-section-body">
                ${topRoReps.length === 0 ? '<div class="no-data">No reps in this period.</div>' :
                  topRoReps.map(r => `
                    <div class="ro-rep-row">
                      <div class="ro-rep-name">${r.rep}</div>
                      <div class="ro-rep-vals">
                        <span class="cont">${r.containers}</span>
                        <span class="rev">${fmtMoney(r.monthly)}</span>
                      </div>
                    </div>
                  `).join('')}
              </div>
            </div>
            <div class="ro-section">
              <div class="ro-section-header">
                <span>RO Velocity · Deals/Month</span>
                ${last ? `<span style="color:${velocityDelta >= 0 ? GREEN : RED}">${velocityDir} ${Math.abs(velocityDelta).toFixed(0)}% MoM</span>` : ''}
              </div>
              <div class="ro-section-body" style="padding:4px"><div class="chart-wrap"><canvas id="roVelocityChart"></canvas></div></div>
            </div>
          </div>
        </div>
      </div>
    </div>
  `;
}

function renderAll(view) {
  destroyAllCharts();
  document.getElementById('kpiStrip').innerHTML = renderKpiStrip(view);
  document.getElementById('quadGrid').innerHTML = renderQ1(view) + renderQ2(view) + renderQ3(view) + renderQ4(view);

  // Q2 trend chart
  if (view.trend.length > 0) {
    chartInstances.trendChart = new Chart(document.getElementById('trendChart'), {
      type: 'line',
      data: {
        labels: view.trend.map(t => t.month.substring(5)),
        datasets: [{
          label: 'Monthly Revenue',
          data: view.trend.map(t => t.monthly),
          borderColor: YELLOW, backgroundColor: 'rgba(255,194,14,0.08)',
          borderWidth: 2, tension: 0.3, fill: true,
          pointBackgroundColor: YELLOW, pointBorderColor: BLACK, pointBorderWidth: 1, pointRadius: 3
        }]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: { display: false }, tooltip: tipConfig },
        scales: {
          x: { ticks: { font: chartFont, color: TEXT_DIM, maxRotation: 0 }, grid: { color: BORDER, drawBorder: false } },
          y: { ticks: { font: chartFont, color: TEXT_DIM, callback: v => `$${(v/1000).toFixed(0)}K` }, grid: { color: BORDER, drawBorder: false } }
        }
      }
    });
  }

  // Q4 RO velocity chart
  if (view.roVelocity.length > 0) {
    chartInstances.roVelocityChart = new Chart(document.getElementById('roVelocityChart'), {
      type: 'bar',
      data: {
        labels: view.roVelocity.map(t => t.month.substring(5)),
        datasets: [{
          label: 'RO Deals',
          data: view.roVelocity.map(t => t.deals),
          backgroundColor: view.roVelocity.map((_, i, a) => i === a.length - 1 ? YELLOW : '#444'),
          borderWidth: 0,
          barPercentage: 0.8
        }]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: { display: false }, tooltip: tipConfig },
        scales: {
          x: { ticks: { font: chartFont, color: TEXT_DIM, maxRotation: 0 }, grid: { display: false } },
          y: { ticks: { font: chartFont, color: TEXT_DIM, stepSize: 50 }, grid: { color: BORDER, drawBorder: false }, beginAtZero: true }
        }
      }
    });
  }
}

function bindPeriodButtons() {
  const buttons = document.querySelectorAll('.period-btn');
  buttons.forEach(btn => {
    btn.addEventListener('click', () => {
      const type = btn.dataset.period;
      if (type === 'CUSTOM') {
        document.getElementById('customRangePop').classList.toggle('open');
        return;
      }
      document.getElementById('customRangePop').classList.remove('open');
      buttons.forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      applyPeriod(type);
    });
  });

  document.querySelectorAll('.range-preset button').forEach(pb => {
    pb.addEventListener('click', () => {
      const days = parseInt(pb.dataset.preset);
      const end = new Date();
      const start = new Date(end.getTime() - days * 86400000);
      document.getElementById('rangeFrom').value = start.toISOString().slice(0, 10);
      document.getElementById('rangeTo').value = end.toISOString().slice(0, 10);
    });
  });

  document.getElementById('rangeApply').addEventListener('click', () => {
    const from = document.getElementById('rangeFrom').value;
    const to = document.getElementById('rangeTo').value;
    if (!from || !to) { alert('Pick both dates.'); return; }
    const startDate = new Date(from);
    const endDate = new Date(to);
    if (endDate < startDate) { alert('End date must be after start date.'); return; }
    buttons.forEach(b => b.classList.remove('active'));
    document.getElementById('customBtn').classList.add('active');
    document.getElementById('customRangePop').classList.remove('open');
    applyPeriod('CUSTOM', startDate, endDate);
  });

  document.addEventListener('click', (e) => {
    const pop = document.getElementById('customRangePop');
    const customBtn = document.getElementById('customBtn');
    if (pop.classList.contains('open') && !pop.contains(e.target) && e.target !== customBtn) {
      pop.classList.remove('open');
    }
  });
}

function applyPeriod(type, customStart, customEnd) {
  const period = resolvePeriod(type, currentMetrics, customStart, customEnd);
  currentPeriod = period;
  const view = buildViewData(currentMetrics, period);
  renderAll(view);
}

function updateClock() {
  const now = new Date();
  const hh = String(now.getHours()).padStart(2, '0');
  const mm = String(now.getMinutes()).padStart(2, '0');
  const ss = String(now.getSeconds()).padStart(2, '0');
  document.getElementById('clockTime').textContent = `${hh}:${mm}:${ss}`;
  document.getElementById('clockDate').textContent = now.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' }).toUpperCase();
}

let currentMetrics = null;
let currentPeriod = { type: 'ALL', label: 'All Time' };
const uploadScreen = document.getElementById('uploadScreen');
const wallboard = document.getElementById('wallboard');
const dropZone = document.getElementById('dropZone');
const fileInput = document.getElementById('fileInput');
const dropTitle = document.getElementById('dropTitle');
const errorBanner = document.getElementById('errorBanner');
const resetBtn = document.getElementById('resetBtn');
const brandSub = document.getElementById('brandSub');

async function handleFile(file) {
  errorBanner.style.display = 'none';
  dropTitle.textContent = 'Crunching the numbers...';
  try {
    const buf = await file.arrayBuffer();
    const wb = XLSX.read(buf, { type: 'array', cellDates: true });
    currentMetrics = computeMetrics(wb);
    brandSub.textContent = `Inside + Outside · ${file.name}`;
    bindPeriodButtons();
    uploadScreen.style.display = 'none';
    wallboard.classList.add('active');
    applyPeriod('LAST3');
  } catch (e) {
    console.error(e);
    errorBanner.textContent = '⚠ Failed to parse: ' + e.message;
    errorBanner.style.display = 'block';
    dropTitle.textContent = 'Click or Drag .xlsx';
  }
}

fileInput.addEventListener('change', e => { if (e.target.files[0]) handleFile(e.target.files[0]); });
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragging'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragging'));
dropZone.addEventListener('drop', e => {
  e.preventDefault(); dropZone.classList.remove('dragging');
  if (e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]);
});
resetBtn.addEventListener('click', () => {
  destroyAllCharts();
  wallboard.classList.remove('active');
  uploadScreen.style.display = 'flex';
  fileInput.value = '';
  dropTitle.textContent = 'Click or Drag .xlsx';
  errorBanner.style.display = 'none';
  currentMetrics = null;
});
document.addEventListener('keydown', (e) => {
  if (e.key === 'f' || e.key === 'F') {
    if (!document.fullscreenElement) document.documentElement.requestFullscreen();
    else document.exitFullscreen();
  }
});

updateClock();
setInterval(updateClock, 1000);
</script>
</body>
</html>
