<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Priority Waste · Sales Wallboard</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Inter:wght@400;500;600;700;800&display=swap" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
  :root {
    --yellow: #FFC20E;
    --yellow-soft: #FFD752;
    --black: #000000;
    --bg: #0d0d0d;
    --panel: #161616;
    --panel-2: #1f1f1f;
    --border: #2d2d2d;
    --border-strong: #3a3a3a;
    --text: #e8e8e8;
    --text-dim: #999999;
    --text-muted: #666666;
    --red: #e74c3c;
    --red-bg: #1f0a0a;
    --green: #27ae60;
    --green-bright: #2ecc71;
    --green-bg: #0a1f12;
    --orange: #e67e22;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; overflow: hidden; }
  body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg); color: var(--text); font-size: 13px; -webkit-font-smoothing: antialiased; }
  .display { font-family: 'Oswald', sans-serif; letter-spacing: 0.01em; }

  /* UPLOAD */
  .upload-screen { height: 100vh; width: 100vw; display: flex; align-items: center; justify-content: center; background: var(--bg); padding: 40px; }
  .upload-box { max-width: 680px; width: 100%; padding: 48px; background: var(--panel); border: 2px solid var(--border-strong); }
  .upload-logo { display: flex; align-items: center; gap: 16px; margin-bottom: 32px; }
  .logo-mark { width: 52px; height: 52px; background: var(--yellow); color: var(--black); display: flex; align-items: center; justify-content: center; font-size: 26px; font-weight: 900; }
  .upload-title { font-family: 'Oswald', sans-serif; font-size: 44px; font-weight: 700; line-height: 1.05; color: var(--text); text-transform: uppercase; margin-bottom: 8px; letter-spacing: -0.01em; }
  .upload-title .hl { color: var(--yellow); }
  .upload-sub { font-size: 14px; color: var(--text-dim); margin-bottom: 28px; line-height: 1.6; }
  .drop-zone { display: block; cursor: pointer; padding: 40px; text-align: center; border: 2px dashed var(--border-strong); background: var(--bg); transition: all 0.15s; }
  .drop-zone:hover, .drop-zone.dragging { background: var(--panel-2); border-color: var(--yellow); }
  .drop-icon { font-size: 40px; margin-bottom: 12px; opacity: 0.6; }
  .drop-title { font-family: 'Oswald', sans-serif; font-size: 20px; font-weight: 700; text-transform: uppercase; color: var(--yellow); }
  .drop-sub { font-size: 11px; color: var(--text-muted); margin-top: 8px; font-weight: 500; }
  .error-banner { margin-top: 16px; padding: 14px; background: var(--red-bg); border: 1px solid var(--red); color: var(--red); font-weight: 600; font-size: 13px; }

  /* WALLBOARD */
  .wallboard { display: none; height: 100vh; width: 100vw; flex-direction: column; }
  .wallboard.active { display: flex; }

  /* TOP BAR */
  .top-bar {
    flex-shrink: 0; display: flex; align-items: center; justify-content: space-between;
    padding: 8px 16px; background: var(--panel); border-bottom: 1px solid var(--border-strong);
    height: 50px;
  }
  .brand-block { display: flex; align-items: center; gap: 10px; }
  .brand-mark { width: 32px; height: 32px; background: var(--yellow); color: var(--black); display: flex; align-items: center; justify-content: center; font-size: 17px; font-weight: 900; }
  .brand-name { font-family: 'Oswald', sans-serif; font-size: 15px; font-weight: 700; color: var(--text); line-height: 1; letter-spacing: 0.05em; }
  .brand-sub { font-size: 9px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.2em; font-weight: 600; margin-top: 3px; }

  .period-controls { display: flex; align-items: center; gap: 4px; position: relative; }
  .period-label { font-size: 9px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.2em; font-weight: 700; margin-right: 6px; }
  .period-btn { background: transparent; color: var(--text-dim); border: 1px solid var(--border-strong); padding: 5px 10px; font-family: 'Inter', sans-serif; font-weight: 600; font-size: 11px; text-transform: uppercase; cursor: pointer; letter-spacing: 0.05em; transition: all 0.15s; }
  .period-btn:hover { background: var(--panel-2); color: var(--text); }
  .period-btn.active { background: var(--yellow); color: var(--black); border-color: var(--yellow); font-weight: 700; }
  .period-btn.custom-btn.active { background: var(--green); color: var(--black); border-color: var(--green); }

  .custom-range-pop { position: absolute; top: 38px; background: var(--panel); border: 1px solid var(--yellow); padding: 14px; z-index: 100; display: none; right: 0; box-shadow: 0 8px 24px rgba(0,0,0,0.7); min-width: 250px; }
  .custom-range-pop.open { display: block; }
  .custom-range-pop h4 { font-family: 'Oswald', sans-serif; font-size: 12px; font-weight: 700; color: var(--yellow); text-transform: uppercase; letter-spacing: 0.15em; margin-bottom: 10px; }
  .range-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
  .range-row label { font-size: 10px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.1em; font-weight: 600; width: 36px; }
  .range-row input { background: var(--bg); color: var(--yellow); border: 1px solid var(--border-strong); padding: 5px 8px; font-family: 'Inter', sans-serif; font-weight: 600; font-size: 12px; width: 140px; }
  .range-row input::-webkit-calendar-picker-indicator { filter: invert(75%) sepia(100%) saturate(400%) hue-rotate(0deg); cursor: pointer; }
  .range-apply { background: var(--yellow); color: var(--black); border: none; padding: 7px 14px; font-family: 'Oswald', sans-serif; font-weight: 700; font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em; cursor: pointer; width: 100%; margin-top: 6px; }
  .range-apply:hover { background: var(--yellow-soft); }
  .range-preset { display: flex; gap: 4px; margin-top: 6px; }
  .range-preset button { flex: 1; background: var(--bg); color: var(--text-dim); border: 1px solid var(--border-strong); padding: 4px; font-family: 'Inter', sans-serif; font-weight: 600; font-size: 10px; cursor: pointer; text-transform: uppercase; letter-spacing: 0.05em; }
  .range-preset button:hover { background: var(--panel-2); color: var(--yellow); }

  .clock-block { display: flex; align-items: center; gap: 12px; }
  .clock-time { font-family: 'Oswald', sans-serif; font-size: 18px; font-weight: 700; color: var(--text); line-height: 1; }
  .clock-date { font-size: 9px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.18em; font-weight: 600; margin-top: 3px; }
  .reset-btn, .settings-btn { padding: 5px 10px; font-family: 'Inter', sans-serif; font-weight: 600; text-transform: uppercase; font-size: 10px; letter-spacing: 0.1em; background: transparent; color: var(--text-dim); border: 1px solid var(--border-strong); cursor: pointer; }
  .reset-btn:hover, .settings-btn:hover { background: var(--panel-2); color: var(--text); }
  .settings-btn { color: var(--yellow); border-color: var(--yellow); }
  .settings-btn:hover { background: var(--yellow); color: var(--black); }

  /* KPI STRIP */
  .kpi-strip { flex-shrink: 0; display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; padding: 8px; background: var(--bg); }
  .kpi-cell {
    padding: 10px 14px; background: var(--panel); border: 1px solid var(--border);
    display: flex; flex-direction: column; justify-content: center;
    position: relative; overflow: hidden; min-height: 0;
    border-left: 3px solid var(--border-strong);
  }
  .kpi-cell.primary { border-left-color: var(--yellow); }
  .kpi-cell.danger { border-left-color: var(--red); }
  .kpi-cell.success { border-left-color: var(--green); }
  .kpi-cell.neutral { border-left-color: var(--border-strong); }
  .kpi-cell.temp { border-left-color: var(--orange); }

  .kpi-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.15em; color: var(--text-muted); line-height: 1; }
  .kpi-value { font-family: 'Oswald', sans-serif; font-size: 28px; font-weight: 700; line-height: 1; margin-top: 6px; color: var(--text); }
  .kpi-cell.primary .kpi-value { color: var(--yellow); }
  .kpi-cell.danger .kpi-value { color: var(--red); }
  .kpi-cell.success .kpi-value { color: var(--green); }
  .kpi-cell.temp .kpi-value { color: var(--orange); }
  .kpi-sub { font-size: 11px; font-weight: 500; color: var(--text-dim); margin-top: 4px; display: flex; justify-content: space-between; align-items: center; gap: 6px; }
  .kpi-icon { position: absolute; top: 6px; right: 10px; font-size: 16px; opacity: 0.15; }
  .kpi-trend { display: inline-flex; align-items: center; gap: 3px; font-family: 'Oswald', sans-serif; font-weight: 700; font-size: 11px; padding: 1px 5px; border-radius: 2px; }
  .kpi-trend.up { color: var(--green-bright); background: rgba(46,204,113,0.12); }
  .kpi-trend.down { color: var(--red); background: rgba(231,76,60,0.12); }
  .kpi-trend.flat { color: var(--text-muted); background: var(--panel-2); }
  .kpi-trend-bar { height: 3px; background: var(--border); margin-top: 5px; position: relative; overflow: hidden; }
  .kpi-trend-bar .fill { height: 100%; transition: width 0.4s; }
  .kpi-trend-bar .fill.up { background: var(--green-bright); }
  .kpi-trend-bar .fill.down { background: var(--red); }
  .kpi-trend-bar .fill.flat { background: var(--text-muted); }

  /* QUAD GRID */
  .quad-grid { flex: 1; display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; gap: 8px; padding: 0 8px 8px 8px; min-height: 0; }
  .quad-grid.hide-q1 { grid-template-areas: ". q2" "q3 q4"; }

  /* CELL */
  .cell { background: var(--panel); border: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; min-height: 0; }
  .cell-header { flex-shrink: 0; padding: 8px 14px; background: var(--panel-2); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
  .cell-header-title { font-family: 'Oswald', sans-serif; font-weight: 700; font-size: 13px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text); }
  .cell-header-meta { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-muted); }
  .cell-body { flex: 1; padding: 10px; position: relative; min-height: 0; overflow: hidden; }

  .sub-grid { height: 100%; display: grid; gap: 6px; min-height: 0; }

  /* ===== Q1 LEADERBOARD ===== */
  .q1-grid { grid-template-rows: 1fr; }
  .leader-list {
    display: flex; flex-direction: column; gap: 2px;
    min-height: 0; height: 100%;
    overflow-y: auto; overflow-x: hidden;
  }
  .leader-list::-webkit-scrollbar { width: 6px; }
  .leader-list::-webkit-scrollbar-thumb { background: var(--border-strong); }
  .leader-row {
    flex: 0 0 auto;
    display: grid; grid-template-columns: 26px 100px 1fr 70px;
    align-items: center; gap: 8px;
    padding: 3px 8px;
    background: var(--panel-2);
    border-left: 3px solid transparent;
    min-height: 36px;
    transition: background 0.3s, border-color 0.3s;
  }
  .leader-row.gold { background: linear-gradient(90deg, rgba(255,194,14,0.10), transparent); border-left-color: var(--yellow); }
  .leader-row.all-hit {
    background: linear-gradient(90deg, rgba(46,204,113,0.20), rgba(46,204,113,0.06));
    border-left-color: var(--green-bright);
  }
  .leader-rank { font-family: 'Oswald', sans-serif; font-size: 14px; font-weight: 700; text-align: center; color: var(--text-muted); }
  .leader-row.gold .leader-rank { color: var(--yellow); }
  .leader-row.all-hit .leader-rank { color: var(--green-bright); }
  .leader-name-block { min-width: 0; }
  .leader-name { font-family: 'Oswald', sans-serif; font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.02em; line-height: 1.1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--text); }
  .leader-stats { font-size: 9px; font-weight: 500; color: var(--text-dim); margin-top: 1px; line-height: 1.1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .leader-stats strong { color: var(--text); font-weight: 600; }
  .leader-value { font-family: 'Oswald', sans-serif; font-size: 13px; font-weight: 700; text-align: right; color: var(--text); }
  .leader-row.gold .leader-value { color: var(--yellow); }
  .leader-row.all-hit .leader-value { color: var(--green-bright); }

  .goal-bars { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 6px; min-width: 0; }
  .goal-bar { display: flex; flex-direction: column; gap: 2px; min-width: 0; }
  .goal-bar-label { display: flex; justify-content: space-between; align-items: center; font-size: 8px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; line-height: 1; }
  .goal-bar-label .gtype { color: var(--text-muted); }
  .goal-bar-label .gnum { font-family: 'Oswald', sans-serif; font-weight: 700; font-size: 10px; color: var(--text-dim); }
  .goal-bar-track { height: 6px; background: var(--border); position: relative; overflow: hidden; border-radius: 1px; }
  .goal-bar-fill { height: 100%; transition: width 0.4s, background 0.3s; }
  .goal-load-info {
    flex-shrink: 0; padding: 4px 10px; font-size: 9px;
    color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.1em;
    background: var(--bg); border-bottom: 1px solid var(--border);
    display: flex; justify-content: space-between; align-items: center;
  }
  .goal-load-info.warn { color: var(--orange); }

  /* Team goal banner at top of Section 1 */
  .team-goal-banner {
    flex-shrink: 0; padding: 10px 14px;
    background: linear-gradient(180deg, var(--panel-2), var(--panel));
    border-bottom: 1px solid var(--border-strong);
    transition: background 0.4s;
  }
  .team-goal-banner.all-hit {
    background: linear-gradient(180deg, rgba(46,204,113,0.18), rgba(46,204,113,0.04));
    border-bottom-color: var(--green-bright);
  }
  .team-goal-bars { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px; }
  .team-goal-bar { display: flex; flex-direction: column; gap: 4px; min-width: 0; }
  .tgb-head { display: flex; justify-content: space-between; align-items: baseline; }
  .tgb-label { font-family: 'Oswald', sans-serif; font-weight: 700; font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--text-muted); }
  .tgb-num { font-family: 'Oswald', sans-serif; font-weight: 700; font-size: 14px; color: var(--text); }
  .tgb-pct { font-size: 11px; color: var(--text-dim); font-weight: 600; }
  .tgb-track { height: 9px; background: var(--border); position: relative; overflow: hidden; border-radius: 1px; }
  .tgb-fill { height: 100%; transition: width 0.5s, background 0.4s; }

  /* Rep contribution cells (replaces per-rep goal bars) */
  .rep-contrib { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 6px; min-width: 0; }
  .rep-contrib-cell {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 2px 4px; background: var(--bg); border: 1px solid var(--border);
    min-width: 0;
  }
  .rep-contrib-cell .rcl { font-size: 8px; font-weight: 700; letter-spacing: 0.1em; color: var(--text-muted); text-transform: uppercase; line-height: 1; }
  .rep-contrib-cell .rcv { font-family: 'Oswald', sans-serif; font-weight: 700; font-size: 13px; color: var(--text); line-height: 1; margin-top: 2px; }

  /* ===== Q2 PRODUCT MIX + TREND ===== */
  .q2-grid { grid-template-rows: auto 1fr; }
  .product-pills { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; }
  .product-pill {
    padding: 8px 12px; background: var(--panel-2); border: 1px solid var(--border);
    display: flex; flex-direction: column;
    border-left: 3px solid var(--border-strong);
  }
  .product-pill.fel { border-left-color: var(--yellow); }
  .product-pill.ro { border-left-color: var(--text-dim); }
  .product-pill.resi { border-left-color: var(--text-muted); }
  .product-pill.broker { border-left-color: var(--border-strong); }
  .product-pill-label { font-size: 10px; font-weight: 700; text-transform: uppercase; color: var(--text-muted); letter-spacing: 0.1em; }
  .product-pill-main { font-family: 'Oswald', sans-serif; font-size: 22px; font-weight: 700; color: var(--text); line-height: 1; margin-top: 4px; }
  .product-pill.fel .product-pill-main { color: var(--yellow); }
  .product-pill-sub { font-size: 10px; font-weight: 500; color: var(--text-dim); margin-top: 3px; }

  /* ===== Q3 CONTAINER SHARE (SIMPLIFIED) ===== */
  .q3-grid { grid-template-columns: 1fr 1fr 1fr; grid-template-rows: 1fr 1fr; gap: 6px; }
  .size-card {
    background: var(--panel-2); border: 1px solid var(--border);
    border-left: 3px solid var(--text-dim);
    padding: 12px 16px;
    display: flex; flex-direction: column; justify-content: center; gap: 6px;
    min-height: 0;
  }
  .size-card.fel { border-left-color: var(--yellow); }
  .size-card.ro { border-left-color: var(--green); }
  .size-card.resi { border-left-color: var(--orange); }
  .size-card-head { display: flex; justify-content: space-between; align-items: baseline; }
  .size-card-name { font-family: 'Oswald', sans-serif; font-weight: 700; font-size: 24px; color: var(--yellow); letter-spacing: 0.02em; line-height: 1; }
  .size-card.ro .size-card-name { color: var(--green-bright); }
  .size-card.resi .size-card-name { color: var(--orange); }
  .size-card-cls { font-size: 9px; font-weight: 700; letter-spacing: 0.18em; color: var(--text-muted); text-transform: uppercase; }
  .size-card-units { font-family: 'Oswald', sans-serif; font-size: 38px; font-weight: 700; color: var(--text); line-height: 1; }
  .size-card-units-label { font-size: 9px; font-weight: 700; letter-spacing: 0.18em; color: var(--text-muted); text-transform: uppercase; line-height: 1; }

  /* ===== Q4 ROLL-OFF ===== */
  .q4-grid { grid-template-rows: auto auto 1fr; gap: 6px; }
  .ro-headline { display: grid; grid-template-columns: 1.4fr 1fr 1fr; gap: 6px; }
  .ro-headline-cell { padding: 8px 12px; background: var(--panel-2); border: 1px solid var(--border); }
  .ro-headline-cell.warn { border-left: 3px solid var(--red); }
  .ro-headline-cell.primary { border-left: 3px solid var(--yellow); }
  .ro-headline-cell.neutral { border-left: 3px solid var(--text-dim); }
  .ro-headline-label { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.18em; color: var(--text-muted); }
  .ro-headline-val { font-family: 'Oswald', sans-serif; font-size: 22px; font-weight: 700; line-height: 1; margin-top: 3px; color: var(--text); }
  .ro-headline-cell.warn .ro-headline-val { color: var(--red); }
  .ro-headline-cell.primary .ro-headline-val { color: var(--yellow); }
  .ro-headline-sub { font-size: 9px; font-weight: 500; color: var(--text-dim); margin-top: 2px; }

  .ro-yield-table { display: flex; flex-direction: column; gap: 2px; min-height: 0; overflow: hidden; }
  .ro-yield-row {
    display: grid; grid-template-columns: 50px 1fr 70px 70px;
    align-items: center; gap: 10px; padding: 4px 10px;
    background: var(--panel-2); font-size: 11px;
    flex: 1; min-height: 0;
  }
  .ro-yield-size { font-family: 'Oswald', sans-serif; font-weight: 700; font-size: 14px; color: var(--yellow); }
  .ro-yield-bar-wrap { height: 9px; background: var(--border); }
  .ro-yield-bar { height: 100%; background: var(--text-dim); }
  .ro-yield-bar.top { background: var(--yellow); }
  .ro-yield-count { font-family: 'Oswald', sans-serif; font-weight: 700; font-size: 13px; text-align: right; color: var(--text); }
  .ro-yield-rev { font-family: 'Oswald', sans-serif; font-weight: 600; font-size: 11px; text-align: right; color: var(--text-dim); }

  .ro-section-row { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; min-height: 0; }
  .ro-section { background: var(--panel-2); border: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; min-height: 0; }
  .ro-section-header {
    flex-shrink: 0; padding: 5px 10px; background: var(--bg);
    font-family: 'Oswald', sans-serif; font-size: 10px; font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.12em; color: var(--text-dim);
    display: flex; justify-content: space-between; align-items: center;
    border-bottom: 1px solid var(--border);
  }
  .ro-section-body { flex: 1; padding: 6px 8px; min-height: 0; overflow: hidden; display: flex; flex-direction: column; gap: 3px; }

  .ro-rep-row { display: grid; grid-template-columns: 1fr auto; gap: 8px; align-items: center; padding: 3px 4px; font-size: 11px; }
  .ro-rep-name { font-family: 'Oswald', sans-serif; font-weight: 700; font-size: 11px; text-transform: uppercase; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .ro-rep-vals { display: flex; gap: 8px; align-items: baseline; font-size: 10px; }
  .ro-rep-vals .cont { font-family: 'Oswald', sans-serif; font-weight: 700; font-size: 12px; color: var(--yellow); }
  .ro-rep-vals .rev { color: var(--text-dim); }

  .chart-wrap { position: relative; width: 100%; height: 100%; min-height: 0; }
  .no-data { padding: 20px; text-align: center; color: var(--text-muted); font-weight: 600; font-size: 11px; }

  /* ===== SETTINGS MODAL ===== */
  .modal-mask { position: fixed; inset: 0; background: rgba(0,0,0,0.75); display: none; align-items: center; justify-content: center; z-index: 1000; padding: 24px; }
  .modal-mask.open { display: flex; }
  .modal {

<script>
const YELLOW = '#FFC20E';
const BLACK = '#000000';
const RED = '#e74c3c';
const GREEN = '#27ae60';
const GREEN_BRIGHT = '#2ecc71';
const TEXT = '#e8e8e8';
const TEXT_DIM = '#999999';
const PANEL = '#161616';
const BORDER = '#2d2d2d';
const ORANGE = '#e67e22';

// ================ ALWAYS-EXCLUDED REPS (former employees) ================
const HARD_EXCLUDED = new Set([
  'TEAGAN F', 'TEAGAN FULLER', 'TEAGAN',
  'LUKE S', 'LUKE SCHROYER',
  'JACKIE S', 'JACKIE',
  'JORDAN R', 'JORDAN ROWLAND'
]);

// ================ DEFAULT ACTIVE INSIDE-SALES REPS ================
// These are the reps that will show on the leaderboard / goal tracker.
const DEFAULT_ACTIVE_REPS = [
  'ALEX KISH', 'ALEX LAPINSKI', 'LAUREN R', 'HUNTER CZYMBOR',
  'BRANDON MISIAK', 'JANEEN O', 'LUKE D', 'MICHAEL CARROLL',
  'MEGAN S', 'TROY T', 'OMAR'
];

// ================ DEFAULT NAME ALIASES (input → canonical) ================
const DEFAULT_ALIAS_MAP = {
  'ALEX K': 'ALEX KISH', 'ALEX KISH': 'ALEX KISH',
  'ALEXANDER L': 'ALEX LAPINSKI', 'ALEX L': 'ALEX LAPINSKI', 'ALEX LAPINSKI': 'ALEX LAPINSKI',
  'HUNTER': 'HUNTER CZYMBOR', 'HUNTER C': 'HUNTER CZYMBOR',
  'HUNTER CZYMBOR': 'HUNTER CZYMBOR', 'HUNTER CZYBMOR': 'HUNTER CZYMBOR',
  'MIKE': 'MICHAEL CARROLL', 'MIKE C': 'MICHAEL CARROLL', 'MICHAEL CARROLL': 'MICHAEL CARROLL', 'MIKE CARROLL': 'MICHAEL CARROLL',
  'BRANDON': 'BRANDON MISIAK', 'BRANDON M': 'BRANDON MISIAK', 'BRANDON MISIAK': 'BRANDON MISIAK',
  'ALICIA H': 'ALICIA HOLMES', 'ALICIA HOLMES': 'ALICIA HOLMES',
  'ANDREA K': 'ANDREA KRUSE', 'ANDREA KRUSE': 'ANDREA KRUSE',
  'ANDREANA': 'ANDREANA CVETKOVSKA', 'ANDREANA CVETKOVSKA': 'ANDREANA CVETKOVSKA', 'ANDREANA CVETKOVSA': 'ANDREANA CVETKOVSKA',
  'BRETT Q': 'BRETT QUINN', 'BRETT QUINN': 'BRETT QUINN',
  'JANEEN': 'JANEEN O', 'JANEEN O': 'JANEEN O',
  'ALAYNA P': 'ALAYNA PANDUREN', 'ALAYNA PANDUREN': 'ALAYNA PANDUREN',
  'LAUREN': 'LAUREN R', 'LAUREN R': 'LAUREN R',
  'LUKE': 'LUKE D', 'LUKE D': 'LUKE D',
  'MEGAN': 'MEGAN S', 'MEGAN S': 'MEGAN S',
  'TROY': 'TROY T', 'TROY T': 'TROY T', 'TROY THOMPSON': 'TROY T',
  'OMAR': 'OMAR', 'OMAR S': 'OMAR',
  'DAN V': 'DAN V', 'SAM C': 'SAM C', 'PAUL R': 'PAUL R',
  'MYRNA Z': 'MYRNA Z', 'MATTHEW H': 'MATTHEW H', 'DAN M': 'DAN M',
  'TAMMY A': 'TAMMY A', 'NARMINA F': 'NARMINA F',
  'BROKER': 'BROKERS', 'BROKERS': 'BROKERS'
};

// ================ SETTINGS PERSISTENCE ================
const SETTINGS_KEY = 'pw_sales_v2_settings';
function loadSettings() {
  try {
    const raw = localStorage.getItem(SETTINGS_KEY);
    const stored = raw ? JSON.parse(raw) : {};
    return {
      activeReps: stored.activeReps || [...DEFAULT_ACTIVE_REPS],
      panelVisibility: Object.assign(
        { leaderboard: true, productMix: true, containerShare: true, rollOff: true },
        stored.panelVisibility || {}
      ),
      defaultPeriod: stored.defaultPeriod || 'MTD',
      goalOverrides: stored.goalOverrides || {}, // key: `${rep}|${YYYY-MM}` → {felGoal, felAR, tempROGoal, tempROAR, resiGoal, resiAR}
      aliases: Object.assign({}, DEFAULT_ALIAS_MAP, stored.aliases || {})
    };
  } catch (e) {
    return {
      activeReps: [...DEFAULT_ACTIVE_REPS],
      panelVisibility: { leaderboard: true, productMix: true, containerShare: true, rollOff: true },
      defaultPeriod: 'MTD',
      goalOverrides: {},
      aliases: { ...DEFAULT_ALIAS_MAP }
    };
  }
}
function saveSettings(s) {
  try { localStorage.setItem(SETTINGS_KEY, JSON.stringify(s)); } catch (e) {}
}
let SETTINGS = loadSettings();

// ================ FORMATTERS ================
const fmtMoney = (n) => {
  if (n == null || isNaN(n)) return '—';
  if (Math.abs(n) >= 1_000_000) return `$${(n / 1_000_000).toFixed(2)}M`;
  if (Math.abs(n) >= 1_000) return `$${(n / 1_000).toFixed(1)}K`;
  return `$${Math.round(n).toLocaleString()}`;
};
const fmtInt = (n) => (n == null || isNaN(n) ? '—' : Math.round(n).toLocaleString());
const fmtPct = (n) => `${Math.round(n)}%`;

const normalizeSR = (s) => {
  if (!s) return null;
  const t = String(s).trim().toUpperCase();
  return SETTINGS.aliases[t] || t;
};
const isHardExcluded = (rep) => !rep || HARD_EXCLUDED.has(rep);
const isBroker = (rep) => rep === 'BROKERS';
const isActiveRep = (rep) => SETTINGS.activeReps.includes(rep);

const parseNum = (v) => {
  if (v == null || v === '') return 0;
  if (typeof v === 'number') return v;
  const n = parseFloat(String(v).replace(/[$,\s]/g, ''));
  return isNaN(n) ? 0 : n;
};

const getCol = (row, ...names) => {
  for (const n of names) {
    if (row[n] !== undefined) return row[n];
    if (row[' ' + n + ' '] !== undefined) return row[' ' + n + ' '];
    if (row[' ' + n] !== undefined) return row[' ' + n];
    if (row[n + ' '] !== undefined) return row[n + ' '];
  }
  for (const target of names) {
    const t = target.trim().toLowerCase();
    for (const k of Object.keys(row)) {
      if (String(k).trim().toLowerCase() === t) return row[k];
    }
  }
  return undefined;
};

const normalizeContainerSize = (s) => {
  if (s == null || s === '') return null;
  let t = String(s).trim().toUpperCase().replace(/\s+/g, '');
  if (/^\d+$/.test(t)) {
    const n = parseInt(t);
    if (n >= 2 && n <= 10) return `${n}-YD`;
  }
  const m = t.match(/^(\d+)[-]?YD$/);
  if (m) return `${m[1]}-YD`;
  if (t.includes('GAL')) return 'CARTS'; // 95 GAL → CARTS
  if (t === 'CART' || t === 'CARTS') return 'CARTS';
  if (t === 'OWNER') return 'OWNER';
  return t;
};
const classifySize = (sizeNorm) => {
  if (!sizeNorm) return null;
  if (sizeNorm === 'CARTS') return 'RESI';
  if (sizeNorm === 'OWNER') return 'OWNER';
  const m = sizeNorm.match(/^(\d+)-YD$/);
  if (!m) return null;
  const n = parseInt(m[1]);
  return n <= 8 ? 'FEL' : 'RO';
};

// ================ MONTHLY AR GOAL PARSER ================
// Tab columns:  Rep | Month | FEL Goal | FEL AR GOAL | Temp RO Goal | Temp RO AR GOAL | Residential Goal | Residential AR GOAL
// "Goal" = unit count target,  "AR GOAL" = $ revenue target.
// Month may be a Date, an Excel serial, "YYYY-MM", "April 2026", etc.
// defaultYear is used when the month value is just a bare name like "Jan".
function parseGoalMonth(v, defaultYear) {
  if (v == null || v === '') return null;
  if (v instanceof Date && !isNaN(v)) {
    return `${v.getFullYear()}-${String(v.getMonth() + 1).padStart(2, '0')}`;
  }
  if (typeof v === 'number') {
    const epoch = new Date(Date.UTC(1899, 11, 30));
    const d = new Date(epoch.getTime() + v * 86400000);
    if (!isNaN(d)) return `${d.getUTCFullYear()}-${String(d.getUTCMonth() + 1).padStart(2, '0')}`;
  }
  const s = String(v).trim();
  let m = s.match(/^(\d{4})-(\d{1,2})/);
  if (m) return `${m[1]}-${m[2].padStart(2, '0')}`;
  m = s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{2,4})/);
  if (m) {
    const yr = m[3].length === 2 ? '20' + m[3] : m[3];
    return `${yr}-${m[1].padStart(2, '0')}`;
  }
  const monthMap = { JANUARY:1, JAN:1, FEBRUARY:2, FEB:2, MARCH:3, MAR:3, APRIL:4, APR:4, MAY:5, JUNE:6, JUN:6, JULY:7, JUL:7, AUGUST:8, AUG:8, SEPTEMBER:9, SEP:9, SEPT:9, OCTOBER:10, OCT:10, NOVEMBER:11, NOV:11, DECEMBER:12, DEC:12 };
  m = s.match(/^([A-Za-z]+)\s+(\d{4})/);
  if (m) {
    const mn = monthMap[m[1].toUpperCase()];
    if (mn) return `${m[2]}-${String(mn).padStart(2, '0')}`;
  }
  // Bare month name like "Jan" — use defaultYear
  m = s.match(/^([A-Za-z]+)\.?$/);
  if (m && defaultYear) {
    const mn = monthMap[m[1].toUpperCase()];
    if (mn) return `${defaultYear}-${String(mn).padStart(2, '0')}`;
  }
  return null;
}

// Goals are TEAM-WIDE (one row per month, no per-rep breakdown).
// Returns: { goals: Map<YYYY-MM, {felGoal, felAR, tempROGoal, tempROAR, resiGoal, resiAR}>,
//            rowsParsed, sheetName, totalRows }
function parseGoalSheet(workbook, defaultYear) {
  const result = { goals: new Map(), rowsParsed: 0, sheetName: null, totalRows: 0 };
  const sheetName = workbook.SheetNames.find(n => /monthly\s*ar\s*goal/i.test(n) || /^ar\s*goals?$/i.test(n) || /^goals?$/i.test(n) || /inside\s*sales\s*goal/i.test(n));
  if (!sheetName) return result;
  result.sheetName = sheetName;
  const raw = XLSX.utils.sheet_to_json(workbook.Sheets[sheetName], { defval: null });
  result.totalRows = raw.length;
  if (raw.length === 0) return result;

  raw.forEach(row => {
    const monthVal = getCol(row, 'Month', 'MONTH', 'Period', 'Date', 'PERIOD');
    const monthKey = parseGoalMonth(monthVal, defaultYear);
    if (!monthKey) return;
    const goals = {
      felGoal:    parseNum(getCol(row, 'FEL Goal', 'FEL GOAL', 'FEL #', 'FEL Count')),
      felAR:      parseNum(getCol(row, 'FEL AR GOAL', 'FEL AR Goal', 'FEL AR', 'FEL $', 'FEL Revenue')),
      tempROGoal: parseNum(getCol(row, 'Temp RO Goal', 'TEMP RO GOAL', 'Temp RO', 'Temp RO #', 'TempRO Goal')),
      tempROAR:   parseNum(getCol(row, 'Temp RO AR GOAL', 'Temp RO AR Goal', 'TEMP RO AR', 'Temp RO $', 'Temp RO Revenue')),
      resiGoal:   parseNum(getCol(row, 'Residential Goal', 'RESI GOAL', 'Resi Goal', 'RESIDENTIAL GOAL', 'Resi #', 'Residential #')),
      resiAR:     parseNum(getCol(row, 'Residential AR GOAL', 'Residential AR Goal', 'RESI AR', 'RESIDENTIAL AR', 'Resi $', 'Residential $'))
    };
    result.goals.set(monthKey, goals);
    result.rowsParsed++;
  });
  return result;
}

function getTeamGoalsForPeriod(goalMap, period) {
  // Sum team goals across each month in the period; respect inline overrides.
  const months = monthsInPeriod(period);
  const out = { felGoal: 0, felAR: 0, tempROGoal: 0, tempROAR: 0, resiGoal: 0, resiAR: 0 };
  months.forEach(mk => {
    const ov = SETTINGS.goalOverrides[mk]; // override key is just the month
    const g = ov || goalMap.get(mk);
    if (!g) return;
    out.felGoal    += parseNum(g.felGoal);
    out.felAR      += parseNum(g.felAR);
    out.tempROGoal += parseNum(g.tempROGoal);
    out.tempROAR   += parseNum(g.tempROAR);
    out.resiGoal   += parseNum(g.resiGoal);
    out.resiAR     += parseNum(g.resiAR);
  });
  return out;
}

function monthsInPeriod(period) {
  if (period.type === 'ALL') return []; // no goal aggregation when ALL TIME
  const out = [];
  let y = period.startY, m = period.startM;
  while (y < period.endY || (y === period.endY && m <= period.endM)) {
    out.push(`${y}-${String(m).padStart(2, '0')}`);
    m++; if (m > 12) { m = 1; y++; }
  }
  return out;
}

// ================ COMPUTE METRICS ================
function computeMetrics(workbook) {
  const out = { rawBrokResi: [], rawLost: [], availableMonths: [], goalMap: new Map() };
  const sheets = workbook.SheetNames;

  if (sheets.includes('Brok-Resi')) {
    const raw = XLSX.utils.sheet_to_json(workbook.Sheets['Brok-Resi'], { defval: null });
    out.rawBrokResi = raw.filter(r => getCol(r, 'Customer Name') || getCol(r, 'SR')).map(r => {
      const size = normalizeContainerSize(getCol(r, 'Container Size'));
      return {
        sr: normalizeSR(getCol(r, 'SR')),
        size, cls: classifySize(size),
        year: parseNum(getCol(r, 'YEAR')),
        month: parseNum(getCol(r, 'Month')),
        containers: parseNum(getCol(r, '#container')) || 1,
        monthly: parseNum(getCol(r, '$$Monthly')),
        term: parseNum(getCol(r, 'Month Term'))
      };
    }).filter(r => r.year && r.month);
  }

  if (sheets.includes('Lost Business')) {
    const raw = XLSX.utils.sheet_to_json(workbook.Sheets['Lost Business'], { defval: null });
    const monthMap = { JANUARY:1, FEBRUARY:2, MARCH:3, APRIL:4, MAY:5, JUNE:6, JULY:7, AUGUST:8, SEPTEMBER:9, OCTOBER:10, NOVEMBER:11, DECEMBER:12 };
    out.rawLost = raw.filter(r => getCol(r, 'LOST BUSINESS CODE') && getCol(r, 'MONTHLY REVENUE') != null).map(r => ({
      sr: normalizeSR(getCol(r, 'SR')),
      monthlyRev: parseNum(getCol(r, 'MONTHLY REVENUE')),
      year: parseNum(getCol(r, 'YEAR')),
      month: monthMap[String(getCol(r, 'MONTH') || '').trim().toUpperCase()] || null,
      service: String(getCol(r, 'SERVICE TYPE') || '').trim().toUpperCase()
    }));
  }

  const monthsSet = new Set();
  out.rawBrokResi.forEach(r => monthsSet.add(`${r.year}-${String(r.month).padStart(2,'0')}`));
  out.availableMonths = [...monthsSet].sort().reverse();
  // Default year for parsing bare month names like "Jan" — use latest data year
  const defaultYear = out.availableMonths.length > 0
    ? parseInt(out.availableMonths[0].split('-')[0])
    : new Date().getFullYear();

  const goalParse = parseGoalSheet(workbook, defaultYear);
  out.goalMap = goalParse.goals; // Map<YYYY-MM, {…}>
  out.goalMeta = {
    rowsParsed: goalParse.rowsParsed,
    totalRows: goalParse.totalRows,
    sheetName: goalParse.sheetName,
    monthsLoaded: goalParse.goals.size
  };
  return out;
}

// ================ BUILD VIEW DATA ================
function isTempRO(r) { return r.cls === 'RO' && parseNum(r.term) <= 1; }

function buildViewData(metrics, period) {
  const inRange = (y, m) => {
    if (!y || !m) return false;
    if (period.type === 'ALL') return true;
    const key = y * 12 + m;
    const startKey = period.startY * 12 + period.startM;
    const endKey = period.endY * 12 + period.endM;
    return key >= startKey && key <= endKey;
  };

  const br = metrics.rawBrokResi.filter(r => inRange(r.year, r.month));
  const lost = metrics.rawLost.filter(r => inRange(r.year, r.month));

  // ========= REP AGGREGATES =========
  const repMap = new Map();
  br.forEach(r => {
    if (isHardExcluded(r.sr)) return;
    if (!repMap.has(r.sr)) {
      repMap.set(r.sr, {
        rep: r.sr, deals: 0, monthly: 0, recurringMonthly: 0, tempROMonthly: 0,
        containers: 0, fel: 0, ro: 0, tempRO: 0, resi: 0,
        felMonthly: 0, tempROMonthlyOnly: 0, resiMonthly: 0,
        isBroker: isBroker(r.sr)
      });
    }
    const o = repMap.get(r.sr);
    o.deals++;
    o.monthly += r.monthly;
    o.containers += r.containers;
    if (r.cls === 'FEL') {
      o.fel += r.containers;
      o.felMonthly += r.monthly;
      o.recurringMonthly += r.monthly;
    } else if (r.cls === 'RO') {
      o.ro += r.containers;
      if (isTempRO(r)) {
        o.tempRO += r.containers;
        o.tempROMonthlyOnly += r.monthly;
        o.tempROMonthly += r.monthly;
      } else {
        o.recurringMonthly += r.monthly;
      }
    } else if (r.cls === 'RESI') {
      o.resi += r.containers;
      o.resiMonthly += r.monthly;
      o.recurringMonthly += r.monthly;
    }
  });
  const allReps = [...repMap.values()];
  // Active rep leaderboard — only the configured active reps
  const repLeaderboard = allReps
    .filter(r => isActiveRep(r.rep) && !r.isBroker)
    .sort((a, b) => b.recurringMonthly - a.recurringMonthly);
  // ensure all configured active reps appear, even at $0
  SETTINGS.activeReps.forEach(name => {
    if (!repLeaderboard.find(r => r.rep === name)) {
      repLeaderboard.push({
        rep: name, deals: 0, monthly: 0, recurringMonthly: 0, tempROMonthly: 0,
        containers: 0, fel: 0, ro: 0, tempRO: 0, resi: 0,
        felMonthly: 0, tempROMonthlyOnly: 0, resiMonthly: 0, isBroker: false
      });
    }
  });
  repLeaderboard.sort((a, b) => b.recurringMonthly - a.recurringMonthly);

  const brokerStats = allReps.find(r => r.isBroker) || {
    rep: 'BROKERS', deals: 0, monthly: 0, containers: 0, fel: 0, ro: 0, resi: 0,
    recurringMonthly: 0, tempROMonthly: 0
  };

  // ========= TOTALS =========
  const tempRORows = br.filter(isTempRO);
  const recurringRows = br.filter(r => !isTempRO(r));
  const recurringMonthly = recurringRows.reduce((s, r) => s + r.monthly, 0);
  const tempROMonthly = tempRORows.reduce((s, r) => s + r.monthly, 0);
  const totalDeals = br.length;
  const totalContainers = br.reduce((s, r) => s + r.containers, 0);

  // ========= CLASS TOTALS =========
  const classCount = { FEL: 0, RO: 0, RESI: 0 };
  const classMonthly = { FEL: 0, RO: 0, RESI: 0 };
  const classContainers = { FEL: 0, RO: 0, RESI: 0 };
  br.forEach(r => {
    const k = r.cls;
    if (!k || !(k in classCount)) return;
    classCount[k]++; classMonthly[k] += r.monthly; classContainers[k] += r.containers;
  });

  // ========= CONTAINER SHARE BY SIZE (SIMPLIFIED) =========
  // No rep breakdown — just count of units sold and avg $/yard.
  const sizeAggMap = new Map();
  br.forEach(r => {
    if (!r.size) return;
    if (r.size === 'OWNER') return; // exclude HOA
    if (!sizeAggMap.has(r.size)) sizeAggMap.set(r.size, { size: r.size, cls: r.cls, total: 0, totalMonthly: 0, deals: 0 });
    const o = sizeAggMap.get(r.size);
    o.total += r.containers; o.totalMonthly += r.monthly; o.deals++;
  });
  const sizeArray = [...sizeAggMap.values()].map(s => {
    let yards = null;
    const m = s.size.match(/^(\d+)-YD$/);
    if (m) yards = parseInt(m[1]);
    const avgPerYard = yards && s.total > 0 ? (s.totalMonthly / s.total) / yards : null;
    const avgPerUnit = s.total > 0 ? s.totalMonthly / s.total : 0;
    return { ...s, yards, avgPerYard, avgPerUnit };
  }).sort((a, b) => {
    // CARTS first, then by yard size ascending
    if (a.size === 'CARTS') return -1;
    if (b.size === 'CARTS') return 1;
    return (a.yards || 0) - (b.yards || 0);
  });

  // ========= ROLL-OFF =========
  const roRows = br.filter(r => r.cls === 'RO');
  const tempRO = roRows.filter(r => parseNum(r.term) <= 1);
  const longTermRO = roRows.filter(r => parseNum(r.term) >= 24);
  const roTotalContainers = roRows.reduce((s, r) => s + r.containers, 0);
  const roTotalDeals = roRows.length;
  const roMonthlyRev = roRows.reduce((s, r) => s + r.monthly, 0);

  const roSizeMap = new Map();
  roRows.forEach(r => {
    if (!r.size) return;
    if (!roSizeMap.has(r.size)) roSizeMap.set(r.size, { size: r.size, count: 0, deals: 0, monthly: 0 });
    const o = roSizeMap.get(r.size);
    o.count += r.containers; o.deals++; o.monthly += r.monthly;
  });
  const roSizes = [...roSizeMap.values()]
    .filter(s => s.count >= 3)
    .map(s => ({ ...s, avgYield: s.monthly / Math.max(1, s.deals) }))
    .sort((a, b) => {
      const na = parseInt(a.size.match(/\d+/)?.[0] || '0');
      const nb = parseInt(b.size.match(/\d+/)?.[0] || '0');
      return na - nb;
    });

  const roVelocityMap = new Map();
  metrics.rawBrokResi.forEach(r => {
    if (r.cls !== 'RO') return;
    const key = `${r.year}-${String(r.month).padStart(2, '0')}`;
    if (!roVelocityMap.has(key)) roVelocityMap.set(key, { month: key, deals: 0, containers: 0 });
    const o = roVelocityMap.get(key);
    o.deals++; o.containers += r.containers;
  });
  const roVelocity = [...roVelocityMap.values()]
    .filter(t => t.deals >= 5)
    .sort((a, b) => a.month.localeCompare(b.month))
    .slice(-12);

  const roRepMap = new Map();
  roRows.forEach(r => {
    if (isHardExcluded(r.sr)) return;
    if (!roRepMap.has(r.sr)) roRepMap.set(r.sr, { rep: r.sr, deals: 0, containers: 0, monthly: 0 });
    const o = roRepMap.get(r.sr);
    o.deals++; o.containers += r.containers; o.monthly += r.monthly;
  });
  const topRoReps = [...roRepMap.values()]
    .filter(r => !isBroker(r.rep))
    .sort((a, b) => b.monthly - a.monthly).slice(0, 6);

  const roLost = lost.filter(r => r.service === 'RO');
  const roLostRev = roLost.reduce((s, r) => s + r.monthlyRev, 0);

  // Trend
  const trendMap = new Map();
  metrics.rawBrokResi.forEach(r => {
    const key = `${r.year}-${String(r.month).padStart(2, '0')}`;
    if (!trendMap.has(key)) trendMap.set(key, { month: key, monthly: 0, deals: 0 });
    trendMap.get(key).monthly += r.monthly;
    trendMap.get(key).deals++;
  });
  const trend = [...trendMap.values()].filter(t => t.deals >= 10).sort((a, b) => a.month.localeCompare(b.month)).slice(-12);

  const lostMonthly = lost.reduce((s, r) => s + r.monthlyRev, 0);
  const lostCount = lost.length;

  // ========= TEAM TOTALS (active reps only — for goal tracker) =========
  const teamTotals = { fel: 0, tempRO: 0, resi: 0, recurring: 0 };
  repLeaderboard.forEach(r => {
    teamTotals.fel    += r.fel;
    teamTotals.tempRO += r.tempRO;
    teamTotals.resi   += r.resi;
    teamTotals.recurring += r.recurringMonthly;
  });
  const teamGoals = getTeamGoalsForPeriod(metrics.goalMap || new Map(), period);

  return {
    period, recurringMonthly, tempROMonthly, totalDeals, totalContainers,
    classCount, classMonthly, classContainers,
    repLeaderboard, brokerStats, sizeArray,
    teamTotals, teamGoals,
    roTotalContainers, roTotalDeals, roMonthlyRev,
    tempROContainers: tempRO.reduce((s, r) => s + r.containers, 0),
    tempRODeals: tempRO.length,
    longTermROContainers: longTermRO.reduce((s, r) => s + r.containers, 0),
    roSizes, roVelocity, topRoReps, roLostRev, roLostCount: roLost.length,
    lostMonthly, lostCount, trend
  };
}

// ================ PERIOD RESOLVER ================
function resolvePeriod(type, metrics, customStart, customEnd) {
  const months = metrics.availableMonths;
  if (months.length === 0) return { type: 'ALL', label: 'All Time' };
  const [latestY, latestM] = months[0].split('-').map(Number);
  const shiftBack = (y, m, monthsBack) => {
    let newM = m - monthsBack; let newY = y;
    while (newM <= 0) { newM += 12; newY--; }
    return [newY, newM];
  };

  if (type === 'ALL') return { type: 'ALL', label: 'All Time' };
  if (type === 'MTD') return { type: 'RANGE', startY: latestY, startM: latestM, endY: latestY, endM: latestM, label: `${latestY}-${String(latestM).padStart(2,'0')}` };
  if (type === 'LAST1') {
    const [y, m] = shiftBack(latestY, latestM, 1);
    return { type: 'RANGE', startY: y, startM: m, endY: y, endM: m, label: `${y}-${String(m).padStart(2,'0')}` };
  }
  if (type === 'LAST3') {
    const [y, m] = shiftBack(latestY, latestM, 2);
    return { type: 'RANGE', startY: y, startM: m, endY: latestY, endM: latestM, label: `Last 3 Mo` };
  }
  if (type === 'LAST6') {
    const [y, m] = shiftBack(latestY, latestM, 5);
    return { type: 'RANGE', startY: y, startM: m, endY: latestY, endM: latestM, label: `Last 6 Mo` };
  }
  if (type === 'YTD') return { type: 'RANGE', startY: latestY, startM: 1, endY: latestY, endM: latestM, label: `${latestY} YTD` };
  if (type === 'CUSTOM' && customStart && customEnd) {
    return {
      type: 'RANGE',
      startY: customStart.getFullYear(), startM: customStart.getMonth() + 1,
      endY: customEnd.getFullYear(), endM: customEnd.getMonth() + 1,
      label: `${customStart.toISOString().slice(0,10)} → ${customEnd.toISOString().slice(0,10)}`
    };
  }
  return { type: 'ALL', label: 'All Time' };
}

// Period of equal length immediately preceding `period` — for trend deltas.
function priorEquivalentPeriod(period) {
  if (period.type !== 'RANGE') return null;
  const startKey = period.startY * 12 + period.startM;
  const endKey = period.endY * 12 + period.endM;
  const len = endKey - startKey + 1;
  const newEndKey = startKey - 1;
  const newStartKey = newEndKey - len + 1;
  const ky = (k) => Math.floor((k - 1) / 12);
  const km = (k) => ((k - 1) % 12) + 1;
  return {
    type: 'RANGE',
    startY: ky(newStartKey), startM: km(newStartKey),
    endY: ky(newEndKey), endM: km(newEndKey),
    label: 'prior'
  };
}

function deltaPct(curr, prev) {
  if (prev == null || prev === 0) {
    if (curr === 0) return 0;
    return null; // undefined growth
  }
  return ((curr - prev) / Math.abs(prev)) * 100;
}

// ================ KPI STRIP RENDERER ================
function renderTrendBadge(delta) {
  if (delta == null) return `<span class="kpi-trend flat">— NEW</span>`;
  if (Math.abs(delta) < 0.5) return `<span class="kpi-trend flat">▬ FLAT</span>`;
  const dir = delta > 0 ? 'up' : 'down';
  const arrow = delta > 0 ? '▲' : '▼';
  return `<span class="kpi-trend ${dir}">${arrow} ${Math.abs(delta).toFixed(0)}%</span>`;
}

function renderTrendBar(delta) {
  if (delta == null) return `<div class="kpi-trend-bar"><div class="fill flat" style="width:0%"></div></div>`;
  const dir = delta > 0 ? 'up' : delta < 0 ? 'down' : 'flat';
  const w = Math.min(100, Math.abs(delta));
  return `<div class="kpi-trend-bar"><div class="fill ${dir}" style="width:${w}%"></div></div>`;
}

function renderKpiStrip(view, prevView) {
  const { recurringMonthly, tempROMonthly, totalContainers, totalDeals, brokerStats, lostMonthly, lostCount } = view;
  const dRecurring  = prevView ? deltaPct(recurringMonthly, prevView.recurringMonthly) : null;

  const dLostInverted = (dLost == null) ? null : -dLost;

  return `
    <div class="kpi-cell primary">
      <div class="kpi-icon">💰</div>
      <div class="kpi-label">Total New Sales · Recurring</div>
      <div class="kpi-value">${fmtMoney(recurringMonthly)}</div>

// ================ Q1 LEADERBOARD WITH GOAL BARS ================
function progressColor(pct) {
  // Interpolate from yellow → green as pct goes 0 → 100
  // Below 25% use grey-yellow, 25-99% yellow→green, 100% solid bright green
  if (pct >= 100) return GREEN_BRIGHT;
  if (pct <= 0) return '#444';
  const t = Math.max(0, Math.min(1, pct / 100));
  // yellow #FFC20E → green #2ecc71
  const r = Math.round(0xFF + (0x2e - 0xFF) * t);
  const g = Math.round(0xC2 + (0xCC - 0xC2) * t);
  const b = Math.round(0x0E + (0x71 - 0x0E) * t);
  return `rgb(${r},${g},${b})`;
}

function renderGoalBar(label, actual, goal) {
  if (!goal || goal <= 0) {
    return `
      <div class="goal-bar" title="${label}: no goal set">
        <div class="goal-bar-label"><span class="gtype">${label}</span><span class="gnum" style="color:var(--text-muted)">—</span></div>
        <div class="goal-bar-track"><div class="goal-bar-fill" style="width:0%;background:#333"></div></div>
      </div>
    `;
  }
  const pct = (actual / goal) * 100;
  const cap = Math.min(100, pct);
  const color = progressColor(pct);
  return `
    <div class="goal-bar" title="${label}: ${actual} / ${goal} (${pct.toFixed(0)}%)">
      <div class="goal-bar-label">
        <span class="gtype">${label}</span>
        <span class="gnum" style="color:${pct >= 100 ? GREEN_BRIGHT : 'var(--text)'}">${actual}/${goal}</span>
      </div>
      <div class="goal-bar-track"><div class="goal-bar-fill" style="width:${cap}%;background:${color}"></div></div>
    </div>
  `;
}

function renderTeamGoalBar(label, actual, goal) {
  if (!goal || goal <= 0) {
    return `
      <div class="team-goal-bar">
        <div class="tgb-head"><span class="tgb-label">${label}</span><span class="tgb-num" style="color:var(--text-muted)">no goal</span></div>
        <div class="tgb-track"><div class="tgb-fill" style="width:0%;background:#333"></div></div>
      </div>
    `;
  }
  const pct = (actual / goal) * 100;
  const cap = Math.min(100, pct);
  const color = progressColor(pct);
  return `
    <div class="team-goal-bar">
      <div class="tgb-head">
        <span class="tgb-label">${label}</span>
        <span class="tgb-num" style="color:${pct >= 100 ? GREEN_BRIGHT : 'var(--text)'}">${actual} / ${goal} <span class="tgb-pct">(${pct.toFixed(0)}%)</span></span>
      </div>
      <div class="tgb-track"><div class="tgb-fill" style="width:${cap}%;background:${color}"></div></div>
    </div>
  `;
}

// ================ Q4 ROLL-OFF ================
function renderQ4(view) {
  const { roTotalContainers, roTotalDeals, roMonthlyRev, tempROContainers, tempRODeals,
          roSizes, topRoReps } = view;
  const last = view.roVelocity[view.roVelocity.length - 1];
  const prev = view.roVelocity[view.roVelocity.length - 2];
  const velocityDelta = (last && prev) ? ((last.deals - prev.deals) / prev.deals) * 100 : 0;
  const velocityDir = velocityDelta >= 0 ? '▲' : '▼';
  const avgYield = roTotalContainers > 0 ? roMonthlyRev / roTotalContainers : 0;
  const bestSize = [...roSizes].sort((a, b) => b.avgYield - a.avgYield)[0];
  const maxRoSize = roSizes.reduce((m, s) => Math.max(m, s.count), 1);

  return `
    <div class="cell" style="grid-area:q4">
      <div class="cell-header">
        <div class="cell-header-title">Roll-Off Intelligence</div>
        <div class="cell-header-meta">velocity · yield · pipeline risk</div>
      </div>
      <div class="cell-body">
        <div class="sub-grid q4-grid">
          <div class="ro-headline">
            <div class="ro-headline-cell primary">
              <div class="ro-headline-label">Avg $ / Container / Mo</div>
              <div class="ro-headline-val">${fmtMoney(avgYield)}</div>
              <div class="ro-headline-sub">${fmtInt(roTotalContainers)} active · ${fmtMoney(roMonthlyRev)} total</div>
            </div>
            <div class="ro-headline-cell neutral">
              <div class="ro-headline-label">Best Yield Size</div>
              <div class="ro-headline-val">${bestSize ? `${bestSize.size}` : '—'}</div>
              <div class="ro-headline-sub">${bestSize ? `${fmtMoney(bestSize.avgYield)}/mo · ${fmtInt(bestSize.count)} sold` : '—'}</div>
            </div>
            <div class="ro-headline-cell warn">
              <div class="ro-headline-label">⚠ Temp Churn Risk</div>
              <div class="ro-headline-val">${fmtInt(tempROContainers)}</div>
              <div class="ro-headline-sub">${fmtInt(tempRODeals)} short-term · need replacement</div>
            </div>
          </div>

          <div class="ro-yield-table">
            <div style="display:grid;grid-template-columns:50px 1fr 70px 70px;gap:10px;padding:3px 10px;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:0.15em;color:var(--text-muted)">
              <div>Size</div><div>Volume Share</div><div style="text-align:right">Containers</div><div style="text-align:right">Avg $/Mo</div>
            </div>
            ${roSizes.length === 0 ? '<div class="no-data">No roll-off data.</div>' :
              roSizes.map((s, i) => `
                <div class="ro-yield-row">
                  <div class="ro-yield-size">${s.size}</div>
                  <div class="ro-yield-bar-wrap"><div class="ro-yield-bar ${i === 0 ? 'top' : ''}" style="width:${(s.count/maxRoSize)*100}%"></div></div>
                  <div class="ro-yield-count">${fmtInt(s.count)}</div>
                  <div class="ro-yield-rev">${fmtMoney(s.avgYield)}</div>
                </div>`).join('')}
          </div>

          <div class="ro-section-row">
            <div class="ro-section">
              <div class="ro-section-header">
                <span>Top Roll-Off Reps</span>
                <span style="color:var(--yellow)">${fmtInt(roTotalDeals)} deals total</span>
              </div>
              <div class="ro-section-body">
                ${topRoReps.length === 0 ? '<div class="no-data">No reps in this period.</div>' :
                  topRoReps.map(r => `
                    <div class="ro-rep-row">
                      <div class="ro-rep-name">${r.rep}</div>
                      <div class="ro-rep-vals">
                        <span class="cont">${r.containers}</span>
                        <span class="rev">${fmtMoney(r.monthly)}</span>
                      </div>
                    </div>
                  `).join('')}
              </div>
            </div>
            <div class="ro-section">
              <div class="ro-section-header">
                <span>RO Velocity · Deals/Month</span>
                ${last ? `<span style="color:${velocityDelta >= 0 ? GREEN_BRIGHT : RED}">${velocityDir} ${Math.abs(velocityDelta).toFixed(0)}% MoM</span>` : ''}
              </div>
              <div class="ro-section-body" style="padding:4px"><div class="chart-wrap"><canvas id="roVelocityChart"></canvas></div></div>
            </div>
          </div>
        </div>
      </div>
    </div>
  `;
}

// ================ RENDER ALL ================
function buildGridLayout(visibility) {
  // Build CSS grid-template-areas based on which panels are visible
  const cells = [];
  if (visibility.leaderboard)    cells.push('q1');
  if (visibility.productMix)     cells.push('q2');
  if (visibility.containerShare) cells.push('q3');
  if (visibility.rollOff)        cells.push('q4');
  // Pad to fit 2x2 grid
  while (cells.length < 4) cells.push('.');
  return `'${cells[0]} ${cells[1]}' '${cells[2]} ${cells[3]}'`;
}

function renderAll(view, prevView, goalMap, goalMeta) {
  destroyAllCharts();
  document.getElementById('kpiStrip').innerHTML = renderKpiStrip(view, prevView);

  const vis = SETTINGS.panelVisibility;
  const quadGrid = document.getElementById('quadGrid');
  quadGrid.style.gridTemplateAreas = buildGridLayout(vis);
  quadGrid.innerHTML =
    (vis.leaderboard    ? renderQ1(view, goalMap, goalMeta) : '') +
    (vis.productMix     ? renderQ2(view) : '') +
    (vis.containerShare ? renderQ3(view) : '') +
    (vis.rollOff        ? renderQ4(view) : '');

  // Q2 trend chart
  if (vis.productMix && view.trend.length > 0) {
    chartInstances.trendChart = new Chart(document.getElementById('trendChart'), {
      type: 'line',
      data: {
        labels: view.trend.map(t => t.month.substring(5)),
        datasets: [{
          label: 'Monthly Revenue',
          data: view.trend.map(t => t.monthly),
          borderColor: YELLOW, backgroundColor: 'rgba(255,194,14,0.08)',
          borderWidth: 2, tension: 0.3, fill: true,
          pointBackgroundColor: YELLOW, pointBorderColor: BLACK, pointBorderWidth: 1, pointRadius: 3
        }]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: { display: false }, tooltip: tipConfig },
        scales: {
          x: { ticks: { font: chartFont, color: TEXT_DIM, maxRotation: 0 }, grid: { color: BORDER, drawBorder: false } },
          y: { ticks: { font: chartFont, color: TEXT_DIM, callback: v => `$${(v/1000).toFixed(0)}K` }, grid: { color: BORDER, drawBorder: false } }
        }
      }
    });
  }

  // Q4 RO velocity chart
  if (vis.rollOff && view.roVelocity.length > 0) {
    chartInstances.roVelocityChart = new Chart(document.getElementById('roVelocityChart'), {
      type: 'bar',
      data: {
        labels: view.roVelocity.map(t => t.month.substring(5)),
        datasets: [{
          label: 'RO Deals',
          data: view.roVelocity.map(t => t.deals),
          backgroundColor: view.roVelocity.map((_, i, a) => i === a.length - 1 ? YELLOW : '#444'),
          borderWidth: 0,
          barPercentage: 0.8
        }]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: { display: false }, tooltip: tipConfig },
        scales: {
          x: { ticks: { font: chartFont, color: TEXT_DIM, maxRotation: 0 }, grid: { display: false } },
          y: { ticks: { font: chartFont, color: TEXT_DIM, stepSize: 50 }, grid: { color: BORDER, drawBorder: false }, beginAtZero: true }
        }
      }
    });
  }
}

let currentMetrics = null;
let currentPeriod = { type: 'ALL', label: 'All Time' };

function applyPeriod(type, customStart, customEnd) {
  const period = resolvePeriod(type, currentMetrics, customStart, customEnd);
  currentPeriod = period;
  const view = buildViewData(currentMetrics, period);
  const prior = priorEquivalentPeriod(period);
  const prevView = prior ? buildViewData(currentMetrics, prior) : null;
  renderAll(view, prevView, currentMetrics.goalMap, currentMetrics.goalMeta);
}

// ================ PERIOD CONTROLS ================
function bindPeriodButtons() {
  const buttons = document.querySelectorAll('.period-btn');
  buttons.forEach(btn => {
    btn.addEventListener('click', () => {
      const type = btn.dataset.period;
      if (type === 'CUSTOM') {
        document.getElementById('customRangePop').classList.toggle('open');
        return;
      }
      document.getElementById('customRangePop').classList.remove('open');
      buttons.forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      applyPeriod(type);
    });
  });

  document.querySelectorAll('.range-preset button').forEach(pb => {
    pb.addEventListener('click', () => {
      const days = parseInt(pb.dataset.preset);
      const end = new Date();
      const start = new Date(end.getTime() - days * 86400000);
      document.getElementById('rangeFrom').value = start.toISOString().slice(0, 10);
      document.getElementById('rangeTo').value = end.toISOString().slice(0, 10);
    });
  });

  document.getElementById('rangeApply').addEventListener('click', () => {
    const from = document.getElementById('rangeFrom').value;
    const to = document.getElementById('rangeTo').value;
    if (!from || !to) { alert('Pick both dates.'); return; }
    const startDate = new Date(from);
    const endDate = new Date(to);
    if (endDate < startDate) { alert('End date must be after start date.'); return; }
    buttons.forEach(b => b.classList.remove('active'));
    document.getElementById('customBtn').classList.add('active');
    document.getElementById('customRangePop').classList.remove('open');
    applyPeriod('CUSTOM', startDate, endDate);
  });

  document.addEventListener('click', (e) => {
    const pop = document.getElementById('customRangePop');
    const customBtn = document.getElementById('customBtn');
    if (pop.classList.contains('open') && !pop.contains(e.target) && e.target !== customBtn) {
      pop.classList.remove('open');
    }
  });
}

function setActivePeriodButton(type) {
  document.querySelectorAll('.period-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.period === type);
  });
}

let settingsDraft = null;
let settingsActiveTab = 'reps';

function openSettings() {
  settingsDraft = JSON.parse(JSON.stringify(SETTINGS));
  // Add aliases default in case stored map didn't have them all
  settingsDraft.aliases = Object.assign({}, DEFAULT_ALIAS_MAP, settingsDraft.aliases || {});
  settingsActiveTab = 'reps';
  document.getElementById('settingsModal').classList.add('open');
  renderSettingsTabs();
  renderSettingsBody();
}
function closeSettings() {
  document.getElementById('settingsModal').classList.remove('open');
}
function renderSettingsTabs() {
  document.querySelectorAll('.modal-tab').forEach(t => {
    t.classList.toggle('active', t.dataset.tab === settingsActiveTab);
  });
}
function renderSettingsBody() {
  const body = document.getElementById('settingsBody');
  if (settingsActiveTab === 'reps') body.innerHTML = renderRepSettings();
  else if (settingsActiveTab === 'goals') body.innerHTML = renderGoalSettings();
  else if (settingsActiveTab === 'panels') body.innerHTML = renderPanelSettings();
  else if (settingsActiveTab === 'aliases') body.innerHTML = renderAliasSettings();
  else if (settingsActiveTab === 'defaults') body.innerHTML = renderDefaultSettings();

}

function renderRepSettings() {
  // Show all canonical reps that appear in DEFAULT_ALIAS_MAP plus anything currently in activeReps
  const allKnownReps = new Set();

  settingsDraft.activeReps.forEach(r => allKnownReps.add(r));
  const sorted = [...allKnownReps].sort();

  return `
    <div class="settings-section">
      <h3>Active Inside-Sales Reps</h3>

          const checked = settingsDraft.activeReps.includes(r);
          return `<label class="rep-chip ${checked ? 'active' : ''}" data-rep="${r}">

function bindSettingsBody() {
  // Reps tab
  document.querySelectorAll('.rep-chip input').forEach(cb => {
    cb.addEventListener('change', (e) => {
      const rep = e.target.dataset.rep;
      const checked = e.target.checked;
      const idx = settingsDraft.activeReps.indexOf(rep);
      if (checked && idx === -1) settingsDraft.activeReps.push(rep);
      else if (!checked && idx !== -1) settingsDraft.activeReps.splice(idx, 1);
      e.target.closest('.rep-chip').classList.toggle('active', checked);
    });
  });
  const repAddBtn = document.getElementById('repAddBtn');
  if (repAddBtn) {
    repAddBtn.addEventListener('click', () => {
      const v = document.getElementById('repAddInput').value.trim().toUpperCase();
      if (!v) return;
      if (!settingsDraft.activeReps.includes(v)) settingsDraft.activeReps.push(v);
      renderSettingsBody();
    });
  }

  // Goals tab — per-month team-wide overrides
  document.querySelectorAll('.goal-grid:not(.head) input').forEach(inp => {
    inp.addEventListener('input', (e) => {
      const row = e.target.closest('.goal-grid');
      const monthKey = row.dataset.month;
      const field = e.target.dataset.field;
      if (!settingsDraft.goalOverrides[monthKey]) {
        const fromSheet = currentMetrics?.goalMap?.get(monthKey) || {};
        settingsDraft.goalOverrides[monthKey] = { felGoal: 0, felAR: 0, tempROGoal: 0, tempROAR: 0, resiGoal: 0, resiAR: 0, ...fromSheet };
      }
      settingsDraft.goalOverrides[monthKey][field] = parseFloat(e.target.value) || 0;
    });
  });

  // Panels tab
  document.querySelectorAll('.toggle-switch').forEach(sw => {
    sw.addEventListener('click', () => {
      const k = sw.dataset.panel;
      settingsDraft.panelVisibility[k] = !settingsDraft.panelVisibility[k];
      sw.classList.toggle('on', settingsDraft.panelVisibility[k]);
    });
  });

  // Alias tab
  document.querySelectorAll('.alias-del').forEach(b => {
    b.addEventListener('click', () => {
      const from = b.dataset.from;
      delete settingsDraft.aliases[from];
      // Also remove from defaults? No, defaults aren't deletable — only custom additions.
      renderSettingsBody();
    });
  });
  const aliasAddBtn = document.getElementById('aliasAddBtn');
  if (aliasAddBtn) {
    aliasAddBtn.addEventListener('click', () => {
      const from = document.getElementById('aliasNewFrom').value.trim().toUpperCase();
      const to = document.getElementById('aliasNewTo').value.trim().toUpperCase();
      if (!from || !to) return;
      settingsDraft.aliases[from] = to;
      renderSettingsBody();
    });
  }
  document.querySelectorAll('.alias-row input').forEach(inp => {
    inp.addEventListener('change', (e) => {
      const row = e.target.closest('.alias-row');
      const oldFrom = row.dataset.from;
      const fromIn = row.querySelector('[data-field="from"]').value.trim().toUpperCase();
      const toIn = row.querySelector('[data-field="to"]').value.trim().toUpperCase();
      if (oldFrom && oldFrom !== fromIn) delete settingsDraft.aliases[oldFrom];
      if (fromIn && toIn) settingsDraft.aliases[fromIn] = toIn;
    });
  });

  // Defaults tab
  const dp = document.getElementById('defaultPeriod');
  if (dp) {
    dp.addEventListener('change', (e) => {
      settingsDraft.defaultPeriod = e.target.value;
    });
  }
}

function flashSaved() {
  const ind = document.getElementById('savedIndicator');
  ind.classList.add('show');
  setTimeout(() => ind.classList.remove('show'), 1800);
}

// ================ CLOCK ================
function updateClock() {
  const now = new Date();
  const hh = String(now.getHours()).padStart(2, '0');
  const mm = String(now.getMinutes()).padStart(2, '0');
  const ss = String(now.getSeconds()).padStart(2, '0');
  document.getElementById('clockTime').textContent = `${hh}:${mm}:${ss}`;
  document.getElementById('clockDate').textContent = now.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' }).toUpperCase();
}

// ================ FILE LOAD ================
const uploadScreen = document.getElementById('uploadScreen');
const wallboard = document.getElementById('wallboard');
const dropZone = document.getElementById('dropZone');
const fileInput = document.getElementById('fileInput');
const dropTitle = document.getElementById('dropTitle');
const errorBanner = document.getElementById('errorBanner');
const resetBtn = document.getElementById('resetBtn');
const settingsBtn = document.getElementById('settingsBtn');
const brandSub = document.getElementById('brandSub');

async function handleFile(file) {
  errorBanner.style.display = 'none';
  dropTitle.textContent = 'Crunching the numbers...';
  try {
    const buf = await file.arrayBuffer();
    const wb = XLSX.read(buf, { type: 'array', cellDates: true });
    currentMetrics = computeMetrics(wb);
    brandSub.textContent = `Inside + Outside · ${file.name}`;
    bindPeriodButtons();
    uploadScreen.style.display = 'none';
    wallboard.classList.add('active');
    setActivePeriodButton(SETTINGS.defaultPeriod);
    applyPeriod(SETTINGS.defaultPeriod);
  } catch (e) {
    console.error(e);
    errorBanner.textContent = '⚠ Failed to parse: ' + e.message;
    errorBanner.style.display = 'block';
    dropTitle.textContent = 'Click or Drag .xlsx';
  }
}

fileInput.addEventListener('change', e => { if (e.target.files[0]) handleFile(e.target.files[0]); });
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragging'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragging'));
dropZone.addEventListener('drop', e => {
  e.preventDefault(); dropZone.classList.remove('dragging');
  if (e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]);
});
resetBtn.addEventListener('click', () => {
  destroyAllCharts();
  wallboard.classList.remove('active');
  uploadScreen.style.display = 'flex';
  fileInput.value = '';
  dropTitle.textContent = 'Click or Drag .xlsx';
  errorBanner.style.display = 'none';
  currentMetrics = null;
});
settingsBtn.addEventListener('click', openSettings);
document.getElementById('settingsClose').addEventListener('click', closeSettings);
document.getElementById('settingsModal').addEventListener('click', (e) => {
  if (e.target === document.getElementById('settingsModal')) closeSettings();
});
document.querySelectorAll('.modal-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    settingsActiveTab = tab.dataset.tab;
    renderSettingsTabs();
    renderSettingsBody();
  });
});
document.getElementById('settingsApply').addEventListener('click', () => {
  SETTINGS = JSON.parse(JSON.stringify(settingsDraft));
  saveSettings(SETTINGS);
  flashSaved();
  if (currentMetrics) applyPeriod(currentPeriod.type === 'RANGE' ? guessPeriodTypeFromCurrent() : currentPeriod.type);
});
document.getElementById('settingsReset').addEventListener('click', () => {
  if (!confirm('Reset all settings to defaults? Your goal overrides will be lost.')) return;
  localStorage.removeItem(SETTINGS_KEY);
  SETTINGS = loadSettings();
  settingsDraft = JSON.parse(JSON.stringify(SETTINGS));
  renderSettingsBody();
  if (currentMetrics) applyPeriod(SETTINGS.defaultPeriod);
});

function guessPeriodTypeFromCurrent() {
  const active = document.querySelector('.period-btn.active');
  return active ? active.dataset.period : SETTINGS.defaultPeriod;
}

document.addEventListener('keydown', (e) => {
  if (e.key === 'f' || e.key === 'F') {
    if (!document.fullscreenElement) document.documentElement.requestFullscreen();
    else document.exitFullscreen();
  }
  if (e.key === 'Escape') closeSettings();
});

updateClock();
setInterval(updateClock, 1000);
</script>
</body>
</html>
